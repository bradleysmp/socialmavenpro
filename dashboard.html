<!DOCTYPE html>
<!-- SMPro Dashboard v1.4.2 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMPro — Client Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Exact palette from socialmavenpro.co.uk */
    --orange: #FF6B2B;
    --orange-hover: #e8551a;
    --orange-dim: rgba(255,107,43,0.12);
    --cream: #F0EDE8;
    --bg: #0E0F11;
    --bg2: #111315;
    --bg3: #181A1D;
    --bg4: #1F2124;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.10);
    --border3: rgba(255,255,255,0.16);
    --text: #F0EDE8;
    --text2: #8A8784;
    --text3: #4A4846;
    --green: #1D9E75;
    --green-bg: rgba(29,158,117,0.10);
    --red: #E24B4A;
    --red-bg: rgba(226,75,74,0.10);
    --amber: #C97B0A;
    --amber-bg: rgba(201,123,10,0.10);
    --meta: #1877F2;
    --tiktok: #EE1D52;
    --pinterest: #E60023;
    --radius: 8px;
    --radius-sm: 5px;
    --radius-lg: 12px;
  }

  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 220px;
    background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; z-index: 100; overflow-y: auto;
    transition: width 0.25s ease, transform 0.25s ease;
    overflow-x: hidden;
  }
  .sidebar.collapsed { width: 0; border-right: none; }
  .sidebar.collapsed * { opacity: 0; pointer-events: none; }
  .sidebar-toggle {
    position: fixed; left: 220px; top: 14px; z-index: 200;
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--bg3); border: 1px solid var(--border2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: left 0.25s ease, background 0.15s;
    color: var(--text2);
  }
  .sidebar-toggle:hover { background: var(--bg4); color: var(--text); }
  .sidebar-toggle.collapsed { left: 0px; }
  .sidebar-toggle svg { transition: transform 0.25s ease; }
  .sidebar-toggle.collapsed svg { transform: rotate(180deg); }
  .sidebar-logo {
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo-text {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px;
    letter-spacing: -0.5px; color: var(--text); line-height: 1;
  }
  .sidebar-logo-text span { color: var(--orange); }
  .sidebar-logo-sub {
    font-size: 10px; color: var(--text3); margin-top: 4px;
    font-weight: 400; letter-spacing: 0.3px;
  }
  .sidebar-section { padding: 16px 12px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-weight: 500; }
  .client-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; margin: 1px 8px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background 0.15s; border: none; background: none;
    color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px;
    text-align: left; width: calc(100% - 16px);
  }
  .client-btn:hover { background: var(--bg3); color: var(--text); }
  .client-btn.active { background: var(--bg4); color: var(--text); }
  .client-btn.active .client-dot { background: var(--orange); }
  .client-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; transition: background 0.15s; }
  .client-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }
  .api-row { display: flex; gap: 6px; }
  .api-input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 11px;
    padding: 6px 8px; outline: none;
  }
  .api-input:focus { border-color: var(--orange); }
  .api-save {
    background: var(--orange); color: #fff; border: none; border-radius: var(--radius-sm);
    padding: 6px 10px; font-size: 11px; font-family: 'DM Sans', sans-serif; font-weight: 500;
    cursor: pointer; white-space: nowrap;
  }
  .api-save:hover { background: var(--orange-hover); }
  .api-label { font-size: 10px; color: var(--text3); margin-bottom: 5px; }

  /* MAIN */
  .main { margin-left: 220px; min-height: 100vh; transition: margin-left 0.25s ease; }
  .main.expanded { margin-left: 0; }

  /* TOP BAR */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .client-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
  .live-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--green); font-weight: 500; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .period-btn {
    padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
    border: 1px solid var(--border2); background: none; color: var(--text2);
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .period-btn:hover { color: var(--text); border-color: var(--border2); background: var(--bg3); }
  .period-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); }
  .period-btn:hover:not(.active) { color: var(--text); border-color: var(--border3); background: var(--bg3); }

  /* PLATFORM TABS */
  .platform-tabs {
    display: flex; gap: 4px; padding: 16px 24px 0;
    border-bottom: 1px solid var(--border);
  }
  .ptab {
    display: flex; align-items: center; gap: 7px; padding: 10px 16px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    color: var(--text2); transition: color 0.15s; background: none; border-top: none;
    border-left: none; border-right: none; font-family: 'DM Sans', sans-serif;
  }
  .ptab:hover { color: var(--text); }
  .ptab.active { color: var(--cream); border-bottom-color: var(--orange); }
  .ptab-icon { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

  /* CONTENT */
  .content { padding: 24px; }

  /* METRICS GRID */
  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .metric-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; position: relative; overflow: hidden; transition: border-color 0.15s;
  }
  .metric-card:hover { border-color: var(--border2); }
  .metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); font-weight: 500; margin-bottom: 8px; }
  .metric-val { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
  .metric-delta { font-size: 11px; display: flex; align-items: center; gap: 4px; }
  .delta-up { color: var(--green); }
  .delta-down { color: var(--red); }
  .delta-neutral { color: var(--text3); }
  .profit-pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px; margin-top: 4px;
  }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-red { background: var(--red-bg); color: var(--red); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }

  /* CHARTS ROW */
  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 20px; }
  .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .chart-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text2); font-weight: 500; }
  .chart-legend { display: flex; gap: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* BE ROAS GAUGE */
  .be-section { margin-bottom: 8px; }
  .be-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .be-lbl { font-size: 11px; color: var(--text3); min-width: 90px; }
  .be-track { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .be-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .be-val { font-size: 12px; font-weight: 500; min-width: 36px; text-align: right; }

  /* INSIGHTS */
  .insights-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; overflow: hidden; }
  .insights-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); font-weight: 500; }
  .insight-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 18px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .insight-row:last-child { border-bottom: none; }
  .insight-row:hover { background: var(--bg3); }
  .insight-ico { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
  .ico-g { background: var(--green-bg); color: var(--green); }
  .ico-r { background: var(--red-bg); color: var(--red); }
  .ico-a { background: var(--amber-bg); color: var(--amber); }
  .insight-text { flex: 1; font-size: 13px; line-height: 1.5; color: var(--text); }
  .insight-tag { font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px; white-space: nowrap; margin-top: 2px; flex-shrink: 0; }

  /* CAMPAIGNS TABLE */
  .table-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
  .table-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .table-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); font-weight: 500; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text3); font-weight: 500; padding: 10px 14px; text-align: right; border-bottom: 1px solid var(--border); background: var(--bg3); }
  th:first-child { text-align: left; }
  td { padding: 11px 14px; text-align: right; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text2); }
  td:first-child { text-align: left; color: var(--text); font-weight: 500; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  .roas-cell { font-weight: 500; }

  /* LOADING / EMPTY STATES */
  .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text3); gap: 10px; }
  .state-box svg { opacity: 0.3; }
  .state-box p { font-size: 13px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; }
  /* Skeleton loading states */
  @keyframes skeleton-pulse { 0%,100% { opacity: 0.45; } 50% { opacity: 0.9; } }
  .skeleton-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
  .skeleton-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; height: 96px; animation: skeleton-pulse 1.4s ease-in-out infinite; }
  .skeleton-block { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; animation: skeleton-pulse 1.4s ease-in-out infinite; }
  .skeleton-msg { font-size: 12px; color: var(--text-muted); margin: 14px 0 0; text-align: center; }
  /* Client search */
  .client-search { display: block; width: calc(100% - 28px); margin: 0 14px 8px; padding: 7px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; font-family: inherit; outline: none; }
  .client-search:focus { border-color: var(--border2); }
  .client-search::placeholder { color: var(--text-muted); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* RESPONSIVE */
  @media(max-width: 900px) {
    .sidebar { width: 180px; }
    .main { margin-left: 180px; }
    .charts-row { grid-template-columns: 1fr; }
  }
  @media(max-width: 640px) {
    .sidebar { transform: translateX(-100%); }
    .main { margin-left: 0; }
  }

  .compare-banner { background: var(--orange-dim); border-bottom: 1px solid rgba(255,107,43,0.2); padding: 6px 24px; font-size: 11px; color: var(--orange); display: flex; align-items: center; gap: 8px; }
  .compare-banner svg { flex-shrink: 0; }

  /* PDF OVERLAY */
  .pdf-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9000; display: flex; align-items: center; justify-content: center; }
  .pdf-modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 24px; width: 320px; }
  .pdf-modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .pdf-modal-sub { font-size: 12px; color: var(--text3); margin-bottom: 18px; }
  .pdf-option { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid var(--border); margin-bottom: 8px; transition: border-color 0.15s; }
  .pdf-option:hover { border-color: var(--border2); background: var(--bg3); }
  .pdf-option input[type=checkbox] { accent-color: var(--orange); width: 14px; height: 14px; }
  .pdf-option-label { font-size: 13px; }
  .pdf-option-sub { font-size: 11px; color: var(--text3); }

  /* PRINT STYLES */
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body { background: #0E0F11 !important; color: #F0EDE8 !important; }
    .sidebar, .topbar, .platform-tabs, .sidebar-toggle, #compare-banner, .pdf-overlay { display: none !important; }
    .main { margin-left: 0 !important; }
    .content { padding: 0 !important; }
    .print-header { display: block !important; }
    .metric-card, .chart-card, .insights-card, .table-card, .table-card { break-inside: avoid; }
    .charts-row { grid-template-columns: 1fr 1fr !important; }
    canvas { max-width: 100% !important; }
    @page { margin: 10mm; size: A4 landscape; }

    /* Wide tables (product scorecard) — scale to fit page width so no columns clip */
    .table-card { width: 100% !important; overflow: visible !important; }
    .table-card > div { overflow: visible !important; }
    .table-card table { width: 100% !important; table-layout: fixed !important; font-size: 9px !important; }
    .table-card table th, .table-card table td {
      padding: 5px 4px !important;
      white-space: normal !important;
      word-break: break-word !important;
      overflow: visible !important;
      text-overflow: clip !important;
    }
    /* Product name / recommendation columns can wrap; numeric columns stay tight */
    .table-card table th:first-child, .table-card table td:first-child { width: 18% !important; }
    .table-card table th:last-child, .table-card table td:last-child { width: 20% !important; }
    /* Product scorecard table only — small inline thumbnails alongside text rows */
    .table-card table td img { width: 22px !important; height: 22px !important; }
    /* Creative cards — keep thumbnails at full card width on PDF export */
    .creative-card { break-inside: avoid; page-break-inside: avoid; }
    .creative-thumb { width: 100% !important; aspect-ratio: 1 !important; }
    .creative-thumb img { width: 100% !important; height: 100% !important; object-fit: cover !important; }
  }

  .print-header { display: none; padding: 16px 24px 0; }
  .print-header-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; }
  .print-header-logo span { color: #FF6B2B; }
  .print-header-meta { font-size: 12px; color: #8A8784; margin-top: 3px; }

  /* CREATIVES */
  .creative-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; padding: 14px; }
  .creative-card { background: var(--bg3); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); transition: border-color 0.15s; }
  .creative-card:hover { border-color: var(--border2); }
  .creative-thumb { position: relative; width: 100%; aspect-ratio: 1; background: var(--bg4); overflow: hidden; }
  .creative-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.25s ease; }
  .creative-thumb-clickable { cursor: zoom-in; }
  .creative-card:hover .creative-thumb-clickable img { transform: scale(1.04); }
  .creative-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; color: var(--text3); background: linear-gradient(135deg, var(--bg4) 0%, rgba(255,107,43,0.06) 100%); letter-spacing: 1px; }
  .creative-badge { position: absolute; top: 8px; right: 8px; font-size: 11px; font-weight: 700; padding: 3px 7px; border-radius: 4px; color: #fff; font-family: 'Syne', sans-serif; }
  .creative-status-badge { position: absolute; top: 8px; left: 8px; font-size: 9px; font-weight: 600; padding: 3px 7px; border-radius: 3px; color: #fff; letter-spacing: 0.6px; backdrop-filter: blur(4px); }
  .creative-meta { padding: 10px 12px; }
  .creative-name { font-size: 11px; font-weight: 500; color: var(--text); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .creative-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; font-size: 11px; }
  .creative-stat-label { color: var(--text3); }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="password-gate" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="width:100%;max-width:360px;padding:0 24px;">
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-0.5px;margin-bottom:4px;">SM<span style="color:#FF6B2B">Pro</span></div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:32px;">Paid Social · Client Dashboard</div>
    <div style="margin-bottom:12px;">
      <input id="gate-password" type="password" placeholder="Enter password"
        style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px;outline:none;box-sizing:border-box;"
        onkeydown="if(event.key==='Enter')checkPassword()"
        onfocus="this.style.borderColor='#FF6B2B'" onblur="this.style.borderColor='rgba(255,255,255,0.10)'" />
    </div>
    <button onclick="checkPassword()"
      style="width:100%;background:#FF6B2B;color:#fff;border:none;border-radius:6px;padding:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;">
      Access dashboard
    </button>
    <div id="gate-error" style="font-size:12px;color:#E24B4A;margin-top:10px;display:none;">Incorrect password</div>
  </div>
</div>

<script>
  const DASHBOARD_PASSWORD = 'smp2026!';
  function checkPassword() {
    const val = document.getElementById('gate-password').value;
    if (val === DASHBOARD_PASSWORD) {
      sessionStorage.setItem('smp_auth', '1');
      document.getElementById('password-gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    } else {
      document.getElementById('gate-error').style.display = 'block';
      document.getElementById('gate-password').value = '';
      document.getElementById('gate-password').focus();
    }
  }
  document.addEventListener('DOMContentLoaded', () => {
    if (sessionStorage.getItem('smp_auth') === '1') {
      document.getElementById('password-gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    } else {
      document.getElementById('password-gate').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  });
</script>

<!-- SIDEBAR TOGGLE -->
<div id="app">
<button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
    <path d="M7.5 2L3.5 6L7.5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-text">SM<span>Pro</span></div>
    <div class="sidebar-logo-sub">Paid Social · Client Dashboard</div>
  </div>

  <div class="sidebar-section">Clients</div>
  <input class="client-search" id="client-search" type="text" placeholder="Search clients…"
         oninput="filterClients(this.value)" autocomplete="off" />

      </label>

      <div style="display:flex;gap:8px;margin-top:16px;">
        <button onclick="doPrint()" style="flex:1;background:var(--orange);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;">Download PDF</button>

      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function doPrint() {
  const clientName = document.getElementById('topbar-title').textContent;
  const platform = state.platform.charAt(0).toUpperCase() + state.platform.slice(1);
  const periodLabel = state.dateFrom
    ? `${formatDateShort(state.dateFrom)} – ${formatDateShort(state.dateTo)}`
    : state.period?.replace('last_','Last ').replace('this_month','MTD').replace('last_1m','Last month').replace('last_3m','Last 3 months').replace('last_year','Last year') || 'Custom';

  // Update print header
  document.getElementById('print-header-meta').textContent =
    `${platform} Ads · ${periodLabel} · Generated ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}`;

  // Apply section visibility based on checkboxes
  const incMetrics = document.getElementById('pdf-inc-metrics').checked;
  const incCharts = document.getElementById('pdf-inc-charts').checked;
  const incInsights = document.getElementById('pdf-inc-insights').checked;
  const incCampaigns = document.getElementById('pdf-inc-campaigns').checked;
  const incCreatives = document.getElementById('pdf-inc-creatives').checked;

  const content = document.getElementById('content');
  const metricsGrid = content.querySelector('.metrics-grid');
  const chartsRow = content.querySelector('.charts-row');
  const insightsCard = content.querySelector('.insights-card');
  const tablecards = content.querySelectorAll('.table-card');
  const creativeCard = content.querySelector('.creative-grid')?.closest('.table-card');

  if (metricsGrid) metricsGrid.dataset.pdfHide = !incMetrics;
  if (chartsRow) chartsRow.dataset.pdfHide = !incCharts;
  if (insightsCard) insightsCard.dataset.pdfHide = !incInsights;
  tablecards.forEach(tc => {
    if (tc === creativeCard) {
      tc.dataset.pdfHide = !incCreatives;
    } else {
      tc.dataset.pdfHide = !incCampaigns;
    }
  });

  // Hide elements marked for exclusion
  const toHide = content.querySelectorAll('[data-pdf-hide="true"]');
  toHide.forEach(el => el.style.display = 'none');

  document.getElementById('pdf-overlay').remove();

  // Set document title for the PDF filename
  document.title = `${clientName} – ${platform} Report – ${periodLabel}`;

  setTimeout(() => {
    window.print();
    // Restore after print
    setTimeout(() => {
      toHide.forEach(el => el.style.display = '');
      document.title = 'SMPro — Client Dashboard';
    }, 1000);
  }, 300);
}

function renderClientList(filter = '') {
  const list = document.getElementById('client-list');
  let recents = [];
  try { recents = JSON.parse(localStorage.getItem('smp_recent_clients') || '[]'); } catch(e) {}

  // Recents first (in recency order), then the rest alphabetically
  const clients = [...CLIENTS.facebook];
  const recentSet = new Set(recents);
  const ordered = [
    ...recents.map(id => clients.find(c => c.id === id)).filter(Boolean),
    ...clients.filter(c => !recentSet.has(c.id)).sort((a, b) => a.name.localeCompare(b.name)),
  ];

  const f = filter.trim().toLowerCase();
  const visible = f ? ordered.filter(c => c.name.toLowerCase().includes(f)) : ordered;

  list.innerHTML = visible.map((c, i) => {
    const isRecent = recentSet.has(c.id) && !f;
    const divider = (!f && isRecent === false && i > 0 && recentSet.has(visible[i-1].id))
      ? '<div style="height:1px;background:var(--border);margin:6px 10px;"></div>' : '';
    return `${divider}<button class="client-btn${state.client === c.id ? ' active' : ''}" onclick="selectClient('${c.id}')" id="cb-${c.id}"
      onmouseenter="schedulePrefetch('${c.id}')" onmouseleave="cancelPrefetch()">
      <span class="client-dot"></span>
      <span class="client-name">${c.name}</span>
    </button>`;
  }).join('') || '<div style="padding:10px 14px;font-size:12px;color:var(--text-muted);">No clients match</div>';
}

function filterClients(value) {

// ─── HOVER PREFETCH ────────────────────────────────────────
// After 200ms hovering a client, quietly warm the cache with its primary
// tab data so clicking feels instant. Errors are swallowed silently.
let _prefetchTimer = null;
function schedulePrefetch(id) {
  cancelPrefetch();
  _prefetchTimer = setTimeout(() => prefetchClient(id), 200);
}
function cancelPrefetch() {
  if (_prefetchTimer) { clearTimeout(_prefetchTimer); _prefetchTimer = null; }
}
async function prefetchClient(id) {
  if (!state.apiKey || id === state.client) return;
  try {
    const clientConfig = CLIENTS.facebook.find(c => c.id === id);
    const isTikTokOnly = clientConfig?.tiktokOnly === true;
    let connector = 'facebook';
    let accountId = id;
    if (isTikTokOnly) {
      connector = 'tiktok';
      accountId = Object.entries(CLIENTS.tiktok||{}).find(([k,v])=>v===id)?.[0] || id;
    }
    const isLeadGen = LEAD_GEN_CLIENTS.includes(accountId);
    // Mirror the exact field lists loadData uses so cache keys match
    const fields = connector === 'tiktok'
      ? ['date','spend','impressions','clicks','reach','cpm','ctr','complete_payment','complete_payment_roas','cost_per_complete_payment']
      : (isLeadGen
        ? ['date','account_id','spend','impressions','clicks','reach','actions_lead','actions_offsite_conversion_fb_pixel_lead','actions_purchase','cost_per_action_type_offsite_conversion_fb_pixel_lead','cost_per_action_type_offsite_conversion_fb_pixel_purchase','actions_landing_page_view']
        : ['date','account_id','spend','impressions','clicks','reach','actions_purchase','action_values_offsite_conversion_fb_pixel_purchase']);
    await fetchWindsor(connector, accountId, fields, state.period, {}, state.dateFrom, state.dateTo);
  } catch(e) { /* prefetch is best-effort — never surface errors */ }
}

// ─── CLIENT SELECT ─────────────────────────────────────────
function selectClient(id) {
  state.client = id;
  // NOTE: cache intentionally NOT cleared — keys include account IDs, and the
  // 10-min TTL handles freshness. Revisiting a client within TTL is instant.

  // Track recently-viewed clients for sidebar ordering
  try {
    let recents = JSON.parse(localStorage.getItem('smp_recent_clients') || '[]');
    recents = [id, ...recents.filter(r => r !== id)].slice(0, 5);
    localStorage.setItem('smp_recent_clients', JSON.stringify(recents));
  } catch(e) {}

  document.querySelectorAll('.client-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('cb-' + id);
  if (btn) btn.classList.add('active');
  const name = CLIENTS.facebook.find(c => c.id === id)?.name || id;
  document.getElementById('topbar-title').textContent = name;
  document.getElementById('live-badge').style.display = 'flex';
  document.getElementById('platform-tabs').style.display = 'flex';
  document.getElementById('btn-compare').style.display = '';
  document.getElementById('btn-pdf').style.display = '';

  // Show relevant platform tabs
  const clientConfig = CLIENTS.facebook.find(c => c.id === id);
  const isTikTokOnly = clientConfig?.tiktokOnly === true;
  const hasTikTok = Object.values(CLIENTS.tiktok||{}).includes(id);
  document.getElementById('tab-tiktok').style.display = hasTikTok ? '' : 'none';
  const hasGA4 = Object.values(CLIENTS.ga4).includes(id);
  document.getElementById('tab-dpa').style.display = hasGA4 ? '' : 'none';
  document.getElementById('tab-journey').style.display = hasGA4 ? '' : 'none';
  // Brand tab — needs both a brand config and a GA4 property to identify the brand
  const brandCfg = BRAND_TABS[id];
  const brandTab = document.getElementById('tab-brand');
  if (brandTab) {
    brandTab.style.display = (brandCfg && hasGA4) ? '' : 'none';
    if (brandCfg) document.getElementById('tab-brand-label').textContent = brandCfg.label;
  }
  const hasPinterest = Object.values(CLIENTS.pinterest||{}).includes(id);
  const pinTab = document.getElementById('tab-pinterest');
  if (pinTab) pinTab.style.display = hasPinterest ? '' : 'none';
  // Hide Meta tab for TikTok-only clients and auto-select TikTok
  const metaTab = document.getElementById('tab-meta');
  if (metaTab) {
    metaTab.style.display = isTikTokOnly ? 'none' : '';
    if (isTikTokOnly && hasTikTok) {
      // Switch active class to TikTok tab
      metaTab.classList.remove('active');
      const ttTab = document.getElementById('tab-tiktok');
      ttTab.classList.add('active');
      state.platform = 'tiktok';
    } else {
      metaTab.classList.add('active');
      const ttTab = document.getElementById('tab-tiktok');
      if (ttTab) ttTab.classList.remove('active');
      state.platform = 'facebook';
    }
  }

  // Restore a specific tab from the URL hash (deep-link support)
  if (state._restoreTab) {
    const tabIds = { facebook:'tab-meta', tiktok:'tab-tiktok', dpa:'tab-dpa', journey:'tab-journey', pinterest:'tab-pinterest', brand:'tab-brand' };
    const targetTabId = tabIds[state._restoreTab];
    const targetEl = targetTabId ? document.getElementById(targetTabId) : null;
    const isAvailable = targetEl && targetEl.style.display !== 'none';
    if (isAvailable) {
      document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
      if (targetEl) targetEl.classList.add('active');
      state.platform = state._restoreTab;
    }
    state._restoreTab = null;
  }

  writeHash();

  if (!state.apiKey) {
    showError('Add your Windsor.ai API key in the sidebar to load data.');
    return;
  }
  loadData();
}

// ─── URL HASH ROUTING ──────────────────────────────────────
// Persists client/tab/period in the URL so refresh keeps your place
// and views can be bookmarked or shared.
function writeHash() {
  if (!state.client) return;
  const parts = [`client=${state.client}`, `tab=${state.platform}`, `period=${state.period}`];
  if (state.dateFrom && state.dateTo) parts.push(`from=${state.dateFrom}`, `to=${state.dateTo}`);
  history.replaceState(null, '', '#' + parts.join('&'));
}

function restoreFromHash() {
  const h = location.hash.slice(1);
  if (!h) return false;
  const p = {};
  h.split('&').forEach(kv => { const [k, v] = kv.split('='); if (k && v) p[k] = decodeURIComponent(v); });
  if (!p.client || !CLIENTS.facebook.find(c => c.id === p.client)) return false;
  if (p.period) state.period = p.period;
  if (p.from && p.to) { state.dateFrom = p.from; state.dateTo = p.to; }
  // Sync the period button highlight
  document.querySelectorAll('.period-btn').forEach(b => {
    const on = (b.getAttribute('onclick')||'').includes(`'${state.period}'`);
    b.classList.toggle('active', on);
  });
  state._restoreTab = p.tab || null;
  selectClient(p.client);
  return true;
}

  ['cmp-prev','cmp-year','cmp-none'].forEach(id => {

    if (!el) return;
    el.style.background = 'var(--bg3)';
    el.style.borderColor = 'var(--border2)';
    el.style.color = 'var(--text2)';
  });
  const activeId = mode === 'prev_period' ? 'cmp-prev' : mode === 'prev_year' ? 'cmp-year' : 'cmp-none';
  const activeEl = document.getElementById(activeId);
  if (activeEl) {
    activeEl.style.background = 'var(--orange-dim)';

  }
  const btn = document.getElementById('btn-compare');
  btn.style.background = mode ? 'var(--orange-dim)' : '';
  btn.style.borderColor = mode ? 'var(--orange)' : '';
  btn.style.color = mode ? 'var(--orange)' : '';

  // Update compare banner
  const banner = document.getElementById('compare-banner');
  const bannerText = document.getElementById('compare-banner-text');
  if (mode && banner) {
    const cd = getCompareDates();
    const label = mode === 'prev_year' ? 'Same period last year' : 'Previous period';
    bannerText.textContent = `Comparing to ${label}${cd ? ': '+formatDateShort(cd.from)+' – '+formatDateShort(cd.to) : ''}. Dashed lines on charts show comparison period.`;
    banner.style.display = 'flex';

function formatDateShort(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'2-digit'});
}

function getCompareDates() {
  if (!state.compareMode) return null;
  let from, to;
  if (state.dateFrom && state.dateTo) {
    from = new Date(state.dateFrom + 'T00:00:00');
    to = new Date(state.dateTo + 'T00:00:00');
  } else {
    const preset = state.period;
    const now = new Date();
    if (preset === 'last_7d') { to = new Date(now); to.setDate(to.getDate()-1); from = new Date(to); from.setDate(from.getDate()-6); }
    else if (preset === 'last_30d') { to = new Date(now); to.setDate(to.getDate()-1); from = new Date(to); from.setDate(from.getDate()-29); }
    else if (preset === 'this_month') { from = new Date(now.getFullYear(),now.getMonth(),1); to = new Date(now); }
    else if (preset === 'last_1m') { const lm = new Date(now.getFullYear(),now.getMonth()-1,1); from = lm; to = new Date(now.getFullYear(),now.getMonth(),0); }
    else if (preset === 'last_3m') { to = new Date(now); to.setDate(to.getDate()-1); from = new Date(to); from.setDate(from.getDate()-89); }
    else if (preset === 'last_year') { from = new Date(now.getFullYear()-1,now.getMonth(),now.getDate()); to = new Date(now); to.setDate(to.getDate()-1); }
    else return null;
  }
  const dayDiff = Math.round((to - from) / 86400000);
  let cFrom, cTo;
  if (state.compareMode === 'prev_period') {
    cTo = new Date(from); cTo.setDate(cTo.getDate()-1);
    cFrom = new Date(cTo); cFrom.setDate(cFrom.getDate()-dayDiff);
  } else {
    cFrom = new Date(from); cFrom.setFullYear(cFrom.getFullYear()-1);
    cTo = new Date(to); cTo.setFullYear(cTo.getFullYear()-1);
  }
  return {
    from: cFrom.toISOString().split('T')[0],
    to: cTo.toISOString().split('T')[0]
  };
}

// ─── WINDSOR FETCH ─────────────────────────────────────────
// ─── RESPONSE CACHE ────────────────────────────────────────
// In-memory, 10-minute TTL. Keys include client/account so entries survive
// switching between clients — revisiting a client within 10 min is instant.
const CACHE_TTL_MS = 10 * 60 * 1000;
function cacheGet(key) {
  const entry = state.cache[key];
  if (!entry) return null;
  if (Date.now() - entry.ts > CACHE_TTL_MS) { delete state.cache[key]; return null; }
  return entry.data;
}
function cacheSet(key, data) {
  state.cache[key] = { data, ts: Date.now() };
}

async function fetchWindsor(connector, accountId, fields, datePreset, options = {}, dateFrom = null, dateTo = null) {
  const cacheKey = `${connector}_${accountId}_${fields.join(',')}_${datePreset}_${dateFrom}_${dateTo}_${JSON.stringify(options)}`;
  const cached = cacheGet(cacheKey);
  if (cached) return cached;

  // Extract proxy-level flags from options so they're sent at top level of request
  const { top_n_by_spend, min_spend, strip_zero_spend, ...connectorOptions } = options || {};

  const res = await fetch('/.netlify/functions/windsor', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      api_key: state.apiKey,
      connector,
      date_preset: datePreset,
      date_from: dateFrom,
      date_to: dateTo,
      fields: fields.join(','),
      account_id: accountId,
      options: connectorOptions,
      top_n_by_spend,
      min_spend,
      strip_zero_spend,
    })
  });

  if (!res.ok) {
    const errBody = await res.json().catch(() => ({}));
    throw new Error(`Windsor API error: ${res.status} — ${errBody.detail || errBody.error || ''}`);
  }
  const json = await res.json();
  const data = json.data || json;
  cacheSet(cacheKey, data);
  return data;
}

// Direct Windsor fetch — bypasses Netlify proxy for large requests
async function fetchWindsorDirect(connector, accountId, fields, datePreset, dateFrom = null, dateTo = null, minSpend = 0) {
  const cacheKey = `direct_${connector}_${accountId}_${fields.join(',')}_${datePreset}_${dateFrom}_${dateTo}_${minSpend}`;
  const cachedDirect = cacheGet(cacheKey);
  if (cachedDirect) return cachedDirect;

  // Resolve date presets to explicit dates (required for some connectors)
  const now = new Date();
  const daysAgo = (n) => { const d = new Date(now); d.setDate(d.getDate()-n); return d.toISOString().split('T')[0]; };
  const presetMap = {
    'last_7d':   [daysAgo(7), daysAgo(1)],
    'last_30d':  [daysAgo(30), daysAgo(1)],
    'last_3m':   [daysAgo(90), daysAgo(1)],
    'last_year': [daysAgo(365), daysAgo(1)],
    'this_month':[new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0], now.toISOString().split('T')[0]],
    'last_1m':   [new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().split('T')[0], new Date(now.getFullYear(),now.getMonth(),0).toISOString().split('T')[0]],
  };

  const params = new URLSearchParams();
  params.append('api_key', state.apiKey);
  params.append('fields', fields.join(','));
  if (accountId) {
    params.append('account_id', accountId);
  }
  // minSpend of -1 signals "no spend filter" — used for GA4 which has no spend field
  if (minSpend >= 0) {
    params.append('filter', JSON.stringify([['spend','gt', minSpend]]));
  }

  if (dateFrom && dateTo) {
    params.append('date_from', dateFrom);
    params.append('date_to', dateTo);
  } else if (datePreset) {
    const resolved = presetMap[datePreset];
    if (resolved) {
      params.append('date_from', resolved[0]);
      params.append('date_to', resolved[1]);
    } else {
      params.append('date_preset', datePreset);
    }
  }

  const url = `https://connectors.windsor.ai/${connector}?${params}`;
  let res;
  try {
    res = await fetch(url);
  } catch(e) {
    // CORS or network error — fall back to proxy
    throw new Error(`Windsor direct fetch failed (CORS/network): ${e.message}`);
  }
  if (!res.ok) {
    const text = await res.text().catch(() => '');
    throw new Error(`Windsor API error: ${res.status} — ${text.slice(0,200)}`);
  }
  const raw = await res.json();
  const data = Array.isArray(raw) ? raw : (raw.data || []);
  cacheSet(cacheKey, data);
  return data;
}

// ─── LOAD DATA ─────────────────────────────────────────────
async function loadData() {
  destroyCharts();
  showLoading();

  try {
    const connector = state.platform;
    let accountId = state.client;
    let organicRows = [];

    // ── SINGLE-BRAND VIEW (Meta only) ──
    // Meta has no brand dimension, so the brand is identified in GA4 (item_brand)
    // and joined back to Meta on the Shopify variant id that both sides carry.
    if (connector === 'brand') {
      const cfg = BRAND_TABS[state.client];
      if (!cfg) { showError('No brand configured for this client.'); return; }
      const ga4Id = Object.entries(CLIENTS.ga4).find(([k,v])=>v===state.client)?.[0];
      if (!ga4Id) { showError('No GA4 account linked for this client — brand cannot be identified.'); return; }

      showLoading(`Fetching ${cfg.label} data…`);

      const ga4Fields  = ['item_brand','item_id','item_name','items_viewed','items_added_to_cart','items_purchased','item_revenue'];
      const prodFields = ['product_id','account_id','spend','impressions','clicks'];
      const adFields   = ['ad_name','campaign','spend','impressions','clicks','actions_purchase','action_values_purchase'];

      const [ga4Rows, metaProductRows, metaAdRows] = await Promise.all([
        // GA4 item-level — no spend field, so pass -1 to suppress the spend filter
        (async () => {
          try {
            return await fetchWindsorDirect('googleanalytics4', ga4Id, ga4Fields, state.period, state.dateFrom, state.dateTo, -1);
          } catch(e) {
            console.warn('GA4 direct fetch failed, trying proxy:', e.message);
            try { return await fetchWindsor('googleanalytics4', ga4Id, ga4Fields, state.period, {}, state.dateFrom, state.dateTo); }
            catch(e2) { console.warn('GA4 proxy fetch also failed:', e2.message); return []; }
          }
        })(),
        // Meta product-level — catalogue delivery per variant
        (async () => {
          try {
            const rows = await fetchWindsorDirect('facebook', accountId, prodFields, state.period, state.dateFrom, state.dateTo, 0);
            return rows.filter(r => !r.account_id || String(r.account_id) === String(accountId));
          } catch(e) {
            console.warn('Meta product direct fetch failed, using proxy:', e.message);
            try { return await fetchWindsor('facebook', accountId, prodFields, state.period, { min_spend: 0 }, state.dateFrom, state.dateTo); }
            catch(e2) { console.warn('Meta product proxy fetch failed:', e2.message); return []; }
          }
        })(),
        // Meta ad-level — brand-specific creative, matched on ad_name
        (async () => {
          try {
            return await fetchWindsorDirect('facebook', accountId, adFields, state.period, state.dateFrom, state.dateTo, 0);
          } catch(e) {
            console.warn('Meta ad direct fetch failed, using proxy:', e.message);
            try { return await fetchWindsor('facebook', accountId, adFields, state.period, {}, state.dateFrom, state.dateTo); }
            catch(e2) { console.warn('Meta ad proxy fetch failed:', e2.message); return []; }
          }
        })(),
      ]);

      renderBrandTab(cfg, ga4Rows, metaProductRows, metaAdRows);
      return;
    }

    // ── UNIFIED PRODUCT SCORECARD ──
    if (connector === 'dpa') {
      const ga4Id = Object.entries(CLIENTS.ga4).find(([k,v])=>v===state.client)?.[0];
      if (!ga4Id) { showError('No GA4 account linked for this client.'); return; }
      const merchantId = Object.entries(CLIENTS.merchant).find(([k,v])=>v===state.client)?.[0];
      const hasMerchant = !!merchantId;

      // Proxy aggregates by product_id and returns top 100 by spend server-side
      // so all periods work safely regardless of response size
      const dpaMetaPeriod = state.period;
      const dpaMetaFrom = state.dateFrom;
      const dpaMetaTo = state.dateTo;

      const metaProductFields = ['product_id','account_id','spend','impressions','clicks'];
      const ga4Fields = ['item_id','item_name','item_revenue','items_purchased','items_viewed','items_added_to_cart','purchase_to_view_rate','cart_to_view_rate'];

      // All three sources are independent — fetch in parallel (previously three sequential stages)
      showLoading('Fetching product data…');

      // Meta min-spend filter — kept low enough to surface top 30+ products for all clients
      // while still keeping response size manageable for larger catalogues (CP Lighting)
      const minSpendByPeriod = {
        'last_7d':    0.50,
        'last_30d':   1.50,
        'last_3m':    5.00,
        'last_year': 15.00,
        'this_month': 1.00,
        'last_1m':    1.50,
      };
      // For custom date ranges, calculate threshold based on number of days
      let minSpend = minSpendByPeriod[dpaMetaPeriod];
      if (!minSpend && dpaMetaFrom && dpaMetaTo) {
        const days = Math.max(1, Math.round((new Date(dpaMetaTo) - new Date(dpaMetaFrom))/86400000));
        minSpend = Math.max(0.5, days * 0.08); // £0.08 per day in the period
      }
      if (!minSpend) minSpend = 1.0;

      const [ga4Rows, merchantData, metaRows] = await Promise.all([
        // GA4 product data — direct first (700+ row responses time out through proxy), proxy fallback
        (async () => {
          try {
            return await fetchWindsorDirect('googleanalytics4', ga4Id, ga4Fields, state.period, state.dateFrom, state.dateTo, -1);
          } catch(e) {
            console.warn('GA4 direct fetch failed, trying proxy:', e.message);
            try {
              return await fetchWindsor('googleanalytics4', ga4Id, ga4Fields, state.period, {}, state.dateFrom, state.dateTo);
            } catch(e2) {
              console.warn('GA4 proxy fetch also failed, continuing without GA4 data:', e2.message);
              return [];
            }
          }
        })(),
        // Merchant Center stock/catalogue data (if connected)
        (async () => {
          if (!hasMerchant) return [[], []];
          try {
            return await Promise.all([
              fetchWindsor('google_merchant', merchantId,
                ['product_id','product_title','product_availability','product_price','product_brand','product_category_l1','product_thumbnail_link'],
                state.period, {}, state.dateFrom, state.dateTo),
              fetchWindsor('google_merchant', merchantId,
                ['product_id','product_sell_on_google_quantity'],
                state.period, {}, state.dateFrom, state.dateTo),
            ]);
          } catch(e) {
            console.warn('Merchant fetch failed, continuing without stock data:', e.message);
            return [[], []];
          }
        })(),
        // Meta product data — direct first (no proxy size limits), proxy fallback with server-side aggregation
        (async () => {
          try {
            const rawMetaRows = await fetchWindsorDirect('facebook', accountId, metaProductFields, dpaMetaPeriod, dpaMetaFrom, dpaMetaTo, minSpend);
            const metaProductMap = {};
            rawMetaRows.forEach(r => {
              // Filter to only this client's account
              const rowAccount = String(r.account_id || '');
              if (rowAccount && rowAccount !== String(accountId)) return;
              const pid = r.product_id || '';
              const spend = parseFloat(r.spend || 0);
              if (!pid || spend <= 0) return;
              if (!metaProductMap[pid]) metaProductMap[pid] = { product_id: pid, spend: 0, impressions: 0, clicks: 0 };
              metaProductMap[pid].spend       += spend;
              metaProductMap[pid].impressions += parseFloat(r.impressions || 0);
              metaProductMap[pid].clicks      += parseFloat(r.clicks || 0);
            });
            return Object.values(metaProductMap)
              .sort((a, b) => b.spend - a.spend)
              .slice(0, 30);
          } catch(e) {
            console.warn('Direct fetch failed, using proxy:', e.message);
            // Proxy fallback — pass min_spend so Windsor filters at source
            return await fetchWindsor('facebook', accountId, metaProductFields, dpaMetaPeriod, { top_n_by_spend: 30, min_spend: minSpend }, dpaMetaFrom, dpaMetaTo);
          }
        })(),
      ]);
      const [merchantCat, merchantStock] = merchantData;

      renderProductScorecard(metaRows, ga4Rows, merchantCat, merchantStock, hasMerchant);
      return;
    }

    // ── ATTRIBUTION GAP ANALYSIS (GA4 + Meta + TikTok) ──
    // GA4 last-touch (source/medium) vs platform-claimed (Meta/TikTok).
    // Channel reconstructed from source/medium since Windsor doesn't expose channelGrouping.
    if (connector === 'journey') {
      const ga4Id = Object.entries(CLIENTS.ga4).find(([k,v])=>v===state.client)?.[0];
      if (!ga4Id) { showError('No GA4 account linked for this client.'); return; }

      showLoading('Fetching attribution data…');
      // Use confirmed-working Windsor GA4 fields: source, medium, sessions, conversions, transactionrevenue.
      // The first_user_default_channel_group field does NOT exist in Windsor — only session-level data available.
      const ga4Fields = ['source', 'medium', 'sessions', 'conversions', 'transactionrevenue'];
      const tikTokId = Object.entries(CLIENTS.tiktok||{}).find(([k,v])=>v===state.client)?.[0];

      // All three sources are independent — fetch in parallel (previously sequential: 3x slower)
      const [ga4Rows, metaAgg, ttAgg] = await Promise.all([
        // GA4 — direct first, proxy fallback
        (async () => {
          try {
            return await fetchWindsorDirect('googleanalytics4', ga4Id, ga4Fields, state.period, state.dateFrom, state.dateTo, -1);
          } catch(e) {
            try {
              return await fetchWindsor('googleanalytics4', ga4Id, ga4Fields, state.period, {}, state.dateFrom, state.dateTo);
            } catch(e2) { console.warn('GA4 fetch failed:', e2.message); return null; }
          }
        })(),
        // Meta platform-claimed totals
        (async () => {
          const agg = { conversions: 0, revenue: 0, spend: 0 };
          try {
            const rows = await fetchWindsor('facebook', state.client,
              ['actions_purchase', 'action_values_offsite_conversion_fb_pixel_purchase', 'spend'],
              state.period, {}, state.dateFrom, state.dateTo);
            rows.forEach(r => {
              agg.conversions += parseFloat(r.actions_purchase||0);
              agg.revenue += parseFloat(r.action_values_offsite_conversion_fb_pixel_purchase||0);
              agg.spend += parseFloat(r.spend||0);
            });
          } catch(e) { console.warn('Meta platform fetch failed:', e.message); }
          return agg;
        })(),
        // TikTok platform-claimed totals (if connected)
        (async () => {
          const agg = { conversions: 0, revenue: 0, spend: 0 };
          if (!tikTokId) return agg;
          try {
            const rows = await fetchWindsor('tiktok', tikTokId,
              ['spend', 'complete_payment', 'complete_payment_roas'],
              state.period, {}, state.dateFrom, state.dateTo);
            rows.forEach(r => {
              const s = parseFloat(r.spend||0);
              agg.spend += s;
              agg.conversions += parseFloat(r.complete_payment||0);
              agg.revenue += s * parseFloat(r.complete_payment_roas||0);
            });
          } catch(e) { console.warn('TikTok platform fetch failed:', e.message); }
          return agg;
        })(),
      ]);

      if (ga4Rows === null) {
        showError('Could not fetch GA4 attribution data. Check Windsor connection.');
        return;
      }

      renderAttributionGap(ga4Rows, {
        metaPlatformConversions: metaAgg.conversions, metaPlatformRevenue: metaAgg.revenue, metaSpend: metaAgg.spend,
        ttPlatformConversions: ttAgg.conversions, ttPlatformRevenue: ttAgg.revenue, ttSpend: ttAgg.spend,
      });
      return;
    }

    if (connector === 'tiktok') {
      const tikTokId = Object.entries(CLIENTS.tiktok||{}).find(([k,v])=>v===state.client)?.[0];
      if (!tikTokId) { showError('No TikTok account linked for this client.'); return; }
      accountId = tikTokId;

      const ttFields     = ['date','spend','impressions','clicks','reach','cpm','ctr','complete_payment','complete_payment_roas','cost_per_complete_payment'];
      const ttCampFields = ['campaign','spend','impressions','clicks','reach','cpm','complete_payment','complete_payment_roas'];
      // TikTok rejects the entire request if any image URL has permission issues.
      // Fetch performance fields first, then attempt to fetch images separately.
      const ttCreativeFields = ['ad_name','ad_id','spend','impressions','clicks','complete_payment','complete_payment_roas','ad_status'];
      const ttCreativeImageFields = ['ad_id','image_url','video_cover_url'];

      const [rows, campRows, creativeRows] = await Promise.all([
        fetchWindsor('tiktok', tikTokId, ttFields, state.period, {}, state.dateFrom, state.dateTo),
        fetchWindsor('tiktok', tikTokId, ttCampFields, state.period, {}, state.dateFrom, state.dateTo),
        fetchWindsor('tiktok', tikTokId, ttCreativeFields, state.period, {}, state.dateFrom, state.dateTo),
      ]);

      // Optionally fetch image URLs — wrapped in try/catch since TikTok may 500 on permission issues
      try {
        const imageRows = await fetchWindsor('tiktok', tikTokId, ttCreativeImageFields, state.period, {}, state.dateFrom, state.dateTo);
        const imgMap = {};
        (imageRows||[]).forEach(r => {
          if (r.ad_id) imgMap[r.ad_id] = { image_url: r.image_url, video_cover_url: r.video_cover_url };
        });
        creativeRows.forEach(r => {
          const img = imgMap[r.ad_id];
          if (img) { r.image_url = img.image_url; r.video_cover_url = img.video_cover_url; }
        });
      } catch(e) {
        console.warn('TikTok image fetch failed (some images may have permission issues):', e.message);
      }

      renderDashboard(rows, campRows, creativeRows, connector);
      return;
    }

    if (connector === 'pinterest') {
      const pid = Object.entries(CLIENTS.pinterest).find(([k,v])=>v===state.client)?.[0];
      if (!pid) { showError('No Pinterest account linked for this client.'); return; }
      accountId = pid;

      // Fetch organic data in parallel if available
      const organicId = Object.entries(CLIENTS.pinterest_organic).find(([k,v])=>v===state.client)?.[0];
      const pinterestOptions = { attribution_window: '30/30/30', conversion_report_time: 'TIME_OF_CONVERSION' };

      const paidFields = ['date','spend','impressions','clicks','reach','frequency','cpm','total_checkout','total_checkout_value'];
      const campFields = ['campaign','spend','impressions','clicks','total_checkout','total_checkout_value'];

      const [rows, campRows, orgRows] = await Promise.all([
        fetchWindsor('pinterest', accountId, paidFields, state.period, pinterestOptions),
        fetchWindsor('pinterest', accountId, campFields, state.period, pinterestOptions),
        organicId ? fetchWindsor('pinterest_organic', organicId,
          ['date','pin_impression','pin_click','pin_outbound_click','pin_save'],
          state.period, { 'account__content_type': 'ORGANIC' }) : Promise.resolve([]),
      ]);

      organicRows = orgRows;
      renderDashboard(rows, campRows, [], connector, organicRows);
      return;
    }

    const isLeadGen = LEAD_GEN_CLIENTS.includes(accountId);

    const fields = isLeadGen
      ? ['date','account_id','spend','impressions','clicks','reach','actions_lead','actions_offsite_conversion_fb_pixel_lead','actions_purchase','cost_per_action_type_offsite_conversion_fb_pixel_lead','cost_per_action_type_offsite_conversion_fb_pixel_purchase','actions_landing_page_view']
      : ['date','account_id','spend','impressions','clicks','reach','actions_purchase','action_values_offsite_conversion_fb_pixel_purchase'];

    const campFields = isLeadGen
      ? ['campaign','account_id','spend','impressions','clicks','reach','actions_lead','actions_offsite_conversion_fb_pixel_lead','actions_purchase','cost_per_action_type_offsite_conversion_fb_pixel_lead']
      : ['campaign','account_id','spend','impressions','clicks','reach','actions_purchase','action_values_offsite_conversion_fb_pixel_purchase'];

    const creativeFields = isLeadGen
      ? ['ad_name','ad_id','account_id','spend','impressions','clicks','actions_offsite_conversion_fb_pixel_lead','actions_purchase', connector === 'tiktok' ? 'ad_status' : 'effective_status']
      : ['ad_name','ad_id','account_id','spend','impressions','clicks','actions_purchase','action_values_offsite_conversion_fb_pixel_purchase', connector === 'tiktok' ? 'ad_status' : 'effective_status'];
    // Windsor image fields are connector-specific:
    // Meta exposes image_url + thumbnail_url; TikTok exposes video_thumbnail_url (video ads)
    // and image_url (image ads) — requesting thumbnail_url on TikTok returns nothing.
    // item_id is the underlying TikTok post ID, used to resolve Spark Ad thumbnails
    // (Spark Ads return null video_thumbnail_url because the video is the creator's).
    const creativeImageFields = connector === 'tiktok'
      ? ['ad_id','video_thumbnail_url','item_id']
      : ['ad_id','image_url','thumbnail_url'];

    const [rows, campRows, creativeRows] = await Promise.all([
      fetchWindsor(connector, accountId, fields, state.period, {}, state.dateFrom, state.dateTo),
      fetchWindsor(connector, accountId, campFields, state.period, {}, state.dateFrom, state.dateTo),
      fetchWindsor(connector, accountId, creativeFields, state.period, {}, state.dateFrom, state.dateTo),
    ]);

    // Optionally fetch creative images — use direct browser fetch to bypass Netlify proxy timeout.
    // Windsor takes time to generate signed thumbnail URLs; the direct fetch has no timeout limit.
    // Fetch creative images with two independent paths: direct browser fetch first
    // (no Netlify timeout limit — Windsor is slow generating signed URLs), then the
    // Netlify proxy as fallback if the direct call fails (e.g. CORS policy change).
    // Previously a single direct-fetch failure silently blanked every thumbnail.
    async function fetchCreativeImages(fields) {
      try {
        return await fetchWindsorDirect(connector, accountId, fields, state.period, state.dateFrom, state.dateTo, 0);
      } catch(e) {
        console.warn('Direct image fetch failed, retrying via Netlify proxy:', e.message);
        return await fetchWindsor(connector, accountId, fields, state.period, {}, state.dateFrom, state.dateTo);
      }
    }

    try {
      let imageRows = await fetchCreativeImages(creativeImageFields);
      // TikTok image ads live in a separate field (image_url) which can hard-fail with
      // "insufficient permissions" on some accounts — fetch it separately and tolerate failure
      // so video thumbnails still render even when image_url errors.
      if (connector === 'tiktok') {
        try {
          const tikImgRows = await fetchCreativeImages(['ad_id','image_url']);
          imageRows = (imageRows||[]).concat(tikImgRows||[]);
        } catch(e) {
          console.warn('TikTok image_url fetch failed (video thumbnails unaffected):', e.message);
        }
      }
      const imgMap = {};
      (imageRows||[]).forEach(r => {
        if (!r.ad_id) return;
        if (!imgMap[r.ad_id]) imgMap[r.ad_id] = {};
        const thumb = r.thumbnail_url || r.video_thumbnail_url;
        if (r.image_url && !imgMap[r.ad_id].image_url) imgMap[r.ad_id].image_url = r.image_url;
        if (thumb && !imgMap[r.ad_id].thumbnail_url) imgMap[r.ad_id].thumbnail_url = thumb;
        if (r.item_id && !imgMap[r.ad_id].item_id) imgMap[r.ad_id].item_id = r.item_id;
      });
      creativeRows.forEach(r => {
        const img = imgMap[r.ad_id];
        if (img) {
          if (img.image_url) r.image_url = img.image_url;
          if (img.thumbnail_url) r.thumbnail_url = img.thumbnail_url;
          if (img.item_id) r.item_id = img.item_id;
        }
      });
    } catch(e) {
      console.warn('Creative image fetch failed — cards will render without thumbnails:', e.message);
    }

    // Fetch comparison period if enabled
    let compareRows = [];
    const compareDates = getCompareDates();
    if (compareDates) {
      compareRows = await fetchWindsor(connector, accountId, fields, null, {}, compareDates.from, compareDates.to);
    }

    renderDashboard(rows, campRows, creativeRows, connector, [], isLeadGen, compareRows, compareDates);
  } catch(e) {
    showError('Could not load data. Check your API key or try refreshing. ' + e.message);
  }
}

// ─── RENDER ────────────────────────────────────────────────
function renderDashboard(rows, campRows, creativeRows, connector, organicRows = [], isLeadGen = false, compareRows = [], compareDates = null) {
  const active = rows.filter(r => parseFloat(r.spend||0) > 0);
  if (!active.length) { showError('No data found for this period.'); return; }

  const totalSpend = sum(active, 'spend');
  const totalImpressions = sum(active, 'impressions');
  const totalClicks = sum(active, 'clicks');
  const totalReach = sum(active, 'reach');
  const ctr = totalImpressions > 0 ? (totalClicks / totalImpressions * 100) : 0;
  const avgCpm = totalImpressions > 0 ? (totalSpend / totalImpressions * 1000) : 0;
  const avgFreq = totalReach > 0 ? totalImpressions / totalReach : 0;

  // Lead gen metrics
  const totalLeads = isLeadGen ? sum(active, 'actions_offsite_conversion_fb_pixel_lead') : 0;
  const totalPurchases = isLeadGen ? sum(active, 'actions_purchase') : 0;
  const totalLPV = isLeadGen ? sum(active, 'actions_landing_page_view') : 0;
  const cpl = totalLeads > 0 ? totalSpend / totalLeads : 0;
  const cpp = totalPurchases > 0 ? totalSpend / totalPurchases : 0;
  const leadRate = totalLPV > 0 ? (totalLeads / totalLPV * 100) : 0;
  const clickToLead = totalClicks > 0 ? (totalLeads / totalClicks * 100) : 0;

  // Ecom metrics
  // TikTok revenue = spend × complete_payment_roas (Windsor doesn't return raw revenue value)
  const ttRevCalc = (rows) => rows.reduce((s, r) => s + parseFloat(r.spend||0) * parseFloat(r.complete_payment_roas||0), 0);
  const totalRev = !isLeadGen ? (connector === 'facebook' ? sum(active, 'action_values_offsite_conversion_fb_pixel_purchase') : connector === 'tiktok' ? ttRevCalc(active) : sum(active, 'total_checkout_value')) : 0;
  const totalOrders = !isLeadGen ? (connector === 'facebook' ? sum(active, 'actions_purchase') : connector === 'tiktok' ? sum(active, 'complete_payment') : sum(active, 'total_checkout')) : 0;
  const roas = !isLeadGen && totalSpend > 0 ? totalRev / totalSpend : 0;
  const cpa = !isLeadGen && totalOrders > 0 ? totalSpend / totalOrders : 0;
  const aov = !isLeadGen && totalOrders > 0 ? totalRev / totalOrders : 0;

  // Comparison period metrics
  const hasCompare = compareRows && compareRows.length > 0;
  const cmpActive = hasCompare ? compareRows.filter(r => parseFloat(r.spend||0) > 0) : [];
  const cmpSpend = hasCompare ? sum(cmpActive, 'spend') : 0;
  const cmpRev = hasCompare ? (!isLeadGen ? (connector==='facebook' ? sum(cmpActive,'action_values_offsite_conversion_fb_pixel_purchase') : connector==='tiktok' ? ttRevCalc(cmpActive) : sum(cmpActive,'total_checkout_value')) : 0) : 0;
  const cmpOrders = hasCompare ? (!isLeadGen ? (connector==='facebook' ? sum(cmpActive,'actions_purchase') : connector==='tiktok' ? sum(cmpActive,'complete_payment') : sum(cmpActive,'total_checkout')) : 0) : 0;
  const cmpLeads = hasCompare && isLeadGen ? sum(cmpActive,'actions_offsite_conversion_fb_pixel_lead') : 0;
  const cmpRoas = cmpSpend > 0 && cmpRev > 0 ? cmpRev/cmpSpend : 0;
  const cmpCpl = cmpSpend > 0 && cmpLeads > 0 ? cmpSpend/cmpLeads : 0;
  const cmpImpr = hasCompare ? sum(cmpActive,'impressions') : 0;
  const cmpClicks = hasCompare ? sum(cmpActive,'clicks') : 0;
  const cmpCtr = cmpImpr > 0 ? (cmpClicks/cmpImpr*100) : 0;
  const cmpCpm = cmpImpr > 0 ? (cmpSpend/cmpImpr*1000) : 0;

  function delta(current, previous, invert = false) {
    if (!hasCompare || !previous) return '';
    const pct = ((current - previous) / previous * 100);
    const up = pct >= 0;
    const good = invert ? !up : up;
    const color = good ? 'var(--green)' : 'var(--red)';
    const arrow = up ? '▲' : '▼';
    return `<div style="font-size:10px;color:${color};margin-top:2px;">${arrow} ${Math.abs(pct).toFixed(1)}% vs ${compareDates ? formatDateShort(compareDates.from)+'–'+formatDateShort(compareDates.to) : 'prev'}</div>`;
  }
  const byDate = {};
  active.forEach(r => {
    const d = r.date;
    if (!byDate[d]) byDate[d] = { date:d, spend:0, impressions:0, clicks:0, reach:0,
      action_values_offsite_conversion_fb_pixel_purchase:0, actions_purchase:0,
      total_checkout_value:0, total_checkout:0,
      complete_payment:0, complete_payment_roas_weighted:0,
      actions_offsite_conversion_fb_pixel_lead:0, actions_landing_page_view:0 };
    const daySpend = parseFloat(r.spend||0);
    byDate[d].spend += daySpend;
    byDate[d].impressions += parseFloat(r.impressions||0);
    byDate[d].clicks += parseFloat(r.clicks||0);
    byDate[d].reach += parseFloat(r.reach||0);
    byDate[d].action_values_offsite_conversion_fb_pixel_purchase += parseFloat(r.action_values_offsite_conversion_fb_pixel_purchase||0);
    byDate[d].actions_purchase += parseFloat(r.actions_purchase||0);
    byDate[d].total_checkout_value += parseFloat(r.total_checkout_value||0);

          <div style="flex-shrink:0;width:22px;height:22px;border-radius:50%;background:${c.bg};color:${c.fg};display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;">${mode==='completed'?'✓':a.icon}</div>
          <div style="flex:1;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
              <div style="color:var(--text);font-weight:500;margin-bottom:2px;">${a.title}</div>
              ${mode === 'open' ? `<button onclick="smpDismissAuditAction('${a.id}')" style="background:transparent;border:1px solid var(--border);color:var(--text3);padding:3px 9px;border-radius:3px;font-size:10px;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--green)';this.style.color='var(--green)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text3)'">Mark complete</button>` : ''}
              ${mode === 'completed' && completedMeta ? `<button onclick="smpRestoreAuditAction('${a.id}')" style="background:transparent;border:none;color:var(--text3);padding:2px 4px;font-size:10px;font-family:inherit;cursor:pointer;" title="Restore to open">↺</button>` : ''}
            </div>
            <div style="${mode==='completed'?'color:var(--text3);':''}">${a.detail}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:3px;">
              ${a.subtext}
              ${mode === 'completed' && completedMeta ? ` · <span style="color:var(--green);">Completed ${completedMeta.date}</span>` : ''}
              ${mode === 'completed' && !completedMeta ? ` · <span style="color:var(--green);">Auto-detected as resolved from live data</span>` : ''}
            </div>
          </div>
        </div>`;
      };

      return `
    <div class="table-card" style="margin-top:16px;">
      <div class="table-header" style="display:flex;justify-content:space-between;align-items:center;">
        <div class="table-title">
          <span style="color:var(--orange);">●</span> Audit Action Tracker
          <span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:8px;">May 2026 audit · ${openActions.length} open · ${allCompleted.length} complete</span>
        </div>
      </div>

      <div style="padding:14px;font-size:12px;color:var(--text2);line-height:1.6;">
        ${openActions.length === 0 ? `
          <div style="text-align:center;padding:20px;color:var(--text3);font-size:13px;">
            All audit actions complete or auto-resolved. <span style="color:var(--green);">Nice work.</span>
          </div>` : openActions.map(a => renderActionCard(a, 'open')).join('')}
      </div>

      ${allCompleted.length > 0 ? `
      <div style="border-top:1px solid var(--border);">
        <div onclick="document.getElementById('audit-completed-list').classList.toggle('hidden');this.querySelector('.chev').style.transform=document.getElementById('audit-completed-list').classList.contains('hidden')?'rotate(0deg)':'rotate(90deg)';" style="padding:10px 14px;cursor:pointer;font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:6px;transition:background 0.1s;" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''">
          <span class="chev" style="display:inline-block;transition:transform 0.15s;">▸</span>
          Completed (${allCompleted.length})
        </div>
        <div id="audit-completed-list" class="hidden" style="padding:0 14px 14px;font-size:12px;color:var(--text2);line-height:1.6;">
          ${allCompleted.map(a => renderActionCard(a, 'completed')).join('')}
        </div>
      </div>` : ''}
    </div>`;
    })() : ''}

    ${organicRows.length > 0 ? (() => {
      const orgActive = organicRows.filter(r => parseFloat(r.pin_impression||0) > 0);
      const orgImpr = orgActive.reduce((a,r)=>a+parseFloat(r.pin_impression||0),0);
      const orgClicks = orgActive.reduce((a,r)=>a+parseFloat(r.pin_click||0),0);
      const orgOutbound = orgActive.reduce((a,r)=>a+parseFloat(r.pin_outbound_click||0),0);
      const orgSaves = orgActive.reduce((a,r)=>a+parseFloat(r.pin_save||0),0);
      const orgCtr = orgImpr > 0 ? (orgClicks/orgImpr*100) : 0;
      const totalImprCombined = totalImpressions + orgImpr;
      const totalClicksCombined = totalClicks + orgClicks;
      return `
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Organic Performance</div>
        <div style="font-size:11px;color:var(--text3)">Pinterest organic · content_type: ORGANIC</div>
      </div>
      <div style="padding:14px 16px;">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px;">
          ${metricCard('Organic Impr.', (orgImpr/1000).toFixed(1)+'k', 'from pins', '')}
          ${metricCard('Organic Clicks', orgClicks.toLocaleString(), `${orgCtr.toFixed(2)}% CTR`, '')}
          ${metricCard('Outbound Clicks', orgOutbound.toLocaleString(), 'to website', '')}
          ${metricCard('Saves', orgSaves.toLocaleString(), 'pin saves', '')}
        </div>
        <div style="border-top:1px solid var(--border);padding-top:12px;">
          <div style="font-size:11px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.6px;font-weight:500;">Combined Paid + Organic</div>

            ${metricCard('Total Impressions', (totalImprCombined/1000).toFixed(1)+'k', `${(totalImpressions/1000).toFixed(1)}k paid · ${(orgImpr/1000).toFixed(1)}k organic`, '')}
            ${metricCard('Total Clicks', totalClicksCombined.toLocaleString(), `${totalClicks.toLocaleString()} paid · ${orgClicks.toLocaleString()} organic`, '')}
            ${metricCard('Organic Share', orgImpr > 0 ? (orgImpr/totalImprCombined*100).toFixed(0)+'%' : '-', 'of total impressions', '')}
            ${metricCard('Paid Outbound', totalClicks.toLocaleString(), 'vs '+orgOutbound.toLocaleString()+' organic', '')}
