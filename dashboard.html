<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMPro — Client Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Exact palette from socialmavenpro.co.uk */
    --orange: #FF6B2B;
    --orange-hover: #e8551a;
    --orange-dim: rgba(255,107,43,0.12);
    --cream: #F0EDE8;
    --bg: #0E0F11;
    --bg2: #111315;
    --bg3: #181A1D;
    --bg4: #1F2124;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.10);
    --border3: rgba(255,255,255,0.16);
    --text: #F0EDE8;
    --text2: #8A8784;
    --text3: #4A4846;
    --green: #1D9E75;
    --green-bg: rgba(29,158,117,0.10);
    --red: #E24B4A;
    --red-bg: rgba(226,75,74,0.10);
    --amber: #C97B0A;
    --amber-bg: rgba(201,123,10,0.10);
    --meta: #1877F2;
    --tiktok: #EE1D52;
    --pinterest: #E60023;
    --radius: 8px;
    --radius-sm: 5px;
    --radius-lg: 12px;
  }

  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 220px;
    background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; z-index: 100; overflow-y: auto;
    transition: width 0.25s ease, transform 0.25s ease;
    overflow-x: hidden;
  }
  .sidebar.collapsed { width: 0; border-right: none; }
  .sidebar.collapsed * { opacity: 0; pointer-events: none; }
  .sidebar-toggle {
    position: fixed; left: 220px; top: 14px; z-index: 200;
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--bg3); border: 1px solid var(--border2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: left 0.25s ease, background 0.15s;
    color: var(--text2);
  }
  .sidebar-toggle:hover { background: var(--bg4); color: var(--text); }
  .sidebar-toggle.collapsed { left: 0px; }
  .sidebar-toggle svg { transition: transform 0.25s ease; }
  .sidebar-toggle.collapsed svg { transform: rotate(180deg); }
  .sidebar-logo {
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo-text {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px;
    letter-spacing: -0.5px; color: var(--text); line-height: 1;
  }
  .sidebar-logo-text span { color: var(--orange); }
  .sidebar-logo-sub {
    font-size: 10px; color: var(--text3); margin-top: 4px;
    font-weight: 400; letter-spacing: 0.3px;
  }
  .sidebar-section { padding: 16px 12px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-weight: 500; }
  .client-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; margin: 1px 8px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background 0.15s; border: none; background: none;
    color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px;
    text-align: left; width: calc(100% - 16px);
  }
  .client-btn:hover { background: var(--bg3); color: var(--text); }
  .client-btn.active { background: var(--bg4); color: var(--text); }
  .client-btn.active .client-dot { background: var(--orange); }
  .client-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; transition: background 0.15s; }
  .client-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }
  .api-row { display: flex; gap: 6px; }
  .api-input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 11px;
    padding: 6px 8px; outline: none;
  }
  .api-input:focus { border-color: var(--orange); }
  .api-save {
    background: var(--orange); color: #fff; border: none; border-radius: var(--radius-sm);
    padding: 6px 10px; font-size: 11px; font-family: 'DM Sans', sans-serif; font-weight: 500;
    cursor: pointer; white-space: nowrap;
  }
  .api-save:hover { background: var(--orange-hover); }
  .api-label { font-size: 10px; color: var(--text3); margin-bottom: 5px; }

  /* MAIN */
  .main { margin-left: 220px; min-height: 100vh; transition: margin-left 0.25s ease; }
  .main.expanded { margin-left: 0; }

  /* TOP BAR */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .client-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: -0.3px; }
  .live-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--green); font-weight: 500; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .period-btn {
    padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
    border: 1px solid var(--border2); background: none; color: var(--text2);
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .period-btn:hover { color: var(--text); border-color: var(--border2); background: var(--bg3); }
  .period-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); }
  .period-btn:hover:not(.active) { color: var(--text); border-color: var(--border3); background: var(--bg3); }

  /* PLATFORM TABS */
  .platform-tabs {
    display: flex; gap: 4px; padding: 16px 24px 0;
    border-bottom: 1px solid var(--border);
  }
  .ptab {
    display: flex; align-items: center; gap: 7px; padding: 10px 16px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    color: var(--text2); transition: color 0.15s; background: none; border-top: none;
    border-left: none; border-right: none; font-family: 'DM Sans', sans-serif;
  }
  .ptab:hover { color: var(--text); }
  .ptab.active { color: var(--cream); border-bottom-color: var(--orange); }
  .ptab-icon { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

  /* CONTENT */
  .content { padding: 24px; }

  /* METRICS GRID */
  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .metric-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; position: relative; overflow: hidden; transition: border-color 0.15s;
  }
  .metric-card:hover { border-color: var(--border2); }
  .metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); font-weight: 500; margin-bottom: 8px; }
  .metric-val { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
  .metric-delta { font-size: 11px; display: flex; align-items: center; gap: 4px; }
  .delta-up { color: var(--green); }
  .delta-down { color: var(--red); }
  .delta-neutral { color: var(--text3); }
  .profit-pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px; margin-top: 4px;
  }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-red { background: var(--red-bg); color: var(--red); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }

  /* CHARTS ROW */
  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 20px; }
  .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .chart-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text2); font-weight: 500; }
  .chart-legend { display: flex; gap: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* BE ROAS GAUGE */
  .be-section { margin-bottom: 8px; }
  .be-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .be-lbl { font-size: 11px; color: var(--text3); min-width: 90px; }
  .be-track { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .be-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .be-val { font-size: 12px; font-weight: 500; min-width: 36px; text-align: right; }

  /* INSIGHTS */
  .insights-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; overflow: hidden; }
  .insights-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); font-weight: 500; }
  .insight-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 18px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .insight-row:last-child { border-bottom: none; }
  .insight-row:hover { background: var(--bg3); }
  .insight-ico { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
  .ico-g { background: var(--green-bg); color: var(--green); }
  .ico-r { background: var(--red-bg); color: var(--red); }
  .ico-a { background: var(--amber-bg); color: var(--amber); }
  .insight-text { flex: 1; font-size: 13px; line-height: 1.5; color: var(--text); }
  .insight-tag { font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px; white-space: nowrap; margin-top: 2px; flex-shrink: 0; }

  /* CAMPAIGNS TABLE */
  .table-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
  .table-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .table-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); font-weight: 500; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text3); font-weight: 500; padding: 10px 14px; text-align: right; border-bottom: 1px solid var(--border); background: var(--bg3); }
  th:first-child { text-align: left; }
  td { padding: 11px 14px; text-align: right; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text2); }
  td:first-child { text-align: left; color: var(--text); font-weight: 500; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  .roas-cell { font-weight: 500; }

  /* LOADING / EMPTY STATES */
  .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text3); gap: 10px; }
  .state-box svg { opacity: 0.3; }
  .state-box p { font-size: 13px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* RESPONSIVE */
  @media(max-width: 900px) {
    .sidebar { width: 180px; }
    .main { margin-left: 180px; }
    .charts-row { grid-template-columns: 1fr; }
  }
  @media(max-width: 640px) {
    .sidebar { transform: translateX(-100%); }
    .main { margin-left: 0; }
  }

  .compare-banner { background: var(--orange-dim); border-bottom: 1px solid rgba(255,107,43,0.2); padding: 6px 24px; font-size: 11px; color: var(--orange); display: flex; align-items: center; gap: 8px; }
  .compare-banner svg { flex-shrink: 0; }

  /* CREATIVES */
  .creative-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; padding: 14px; }
  .creative-card { background: var(--bg3); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); transition: border-color 0.15s; }
  .creative-card:hover { border-color: var(--border2); }
  .creative-thumb { position: relative; width: 100%; aspect-ratio: 1; background: var(--bg4); overflow: hidden; }
  .creative-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .creative-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; color: var(--text3); }
  .creative-badge { position: absolute; top: 8px; right: 8px; font-size: 11px; font-weight: 700; padding: 3px 7px; border-radius: 4px; color: #fff; font-family: 'Syne', sans-serif; }
  .creative-meta { padding: 10px 12px; }
  .creative-name { font-size: 11px; font-weight: 500; color: var(--text); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .creative-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; font-size: 11px; }
  .creative-stat-label { color: var(--text3); }
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="password-gate" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="width:100%;max-width:360px;padding:0 24px;">
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-0.5px;margin-bottom:4px;">SM<span style="color:#FF6B2B">Pro</span></div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:32px;">Paid Social · Client Dashboard</div>
    <div style="margin-bottom:12px;">
      <input id="gate-password" type="password" placeholder="Enter password"
        style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px;outline:none;box-sizing:border-box;"
        onkeydown="if(event.key==='Enter')checkPassword()"
        onfocus="this.style.borderColor='#FF6B2B'" onblur="this.style.borderColor='rgba(255,255,255,0.10)'" />
    </div>
    <button onclick="checkPassword()"
      style="width:100%;background:#FF6B2B;color:#fff;border:none;border-radius:6px;padding:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;">
      Access dashboard
    </button>
    <div id="gate-error" style="font-size:12px;color:#E24B4A;margin-top:10px;display:none;">Incorrect password</div>
  </div>
</div>

<script>
  // Password gate — runs before anything else
  const DASHBOARD_PASSWORD = 'Backlinks20008';
  function checkPassword() {
    const val = document.getElementById('gate-password').value;
    if (val === DASHBOARD_PASSWORD) {
      sessionStorage.setItem('smp_auth', '1');
      document.getElementById('password-gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    } else {
      document.getElementById('gate-error').style.display = 'block';
      document.getElementById('gate-password').value = '';
      document.getElementById('gate-password').focus();
    }
  }
  // Check if already authenticated this session
  if (sessionStorage.getItem('smp_auth') === '1') {
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('password-gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    });
  } else {
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('app').style.display = 'none';
    });
  }
</script>

<!-- SIDEBAR TOGGLE -->
<div id="app">
<button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
    <path d="M7.5 2L3.5 6L7.5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-text">SM<span>Pro</span></div>
    <div class="sidebar-logo-sub">Paid Social · Client Dashboard</div>
  </div>

  <div class="sidebar-section">Clients</div>
  <div id="client-list"></div>

  <div class="sidebar-footer">
    <div class="api-label">Windsor.ai API Key</div>
    <div class="api-row">
      <input class="api-input" id="api-key-input" type="password" placeholder="pk_live_..." />
      <button class="api-save" onclick="saveApiKey()">Save</button>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="client-title" id="topbar-title">Select a client</div>
      <div class="live-badge" id="live-badge" style="display:none">
        <span class="live-dot"></span> Live
      </div>
    </div>
    <div class="topbar-right">
      <button class="period-btn active" onclick="setPreset('last_7d',this)">7d</button>
      <button class="period-btn" onclick="setPreset('last_30d',this)">30d</button>
      <button class="period-btn" onclick="setPreset('this_month',this)">MTD</button>
      <button class="period-btn" onclick="setPreset('last_1m',this)">Last mo</button>
      <button class="period-btn" onclick="setPreset('last_3m',this)">3mo</button>
      <button class="period-btn" onclick="setPreset('last_year',this)">Last yr</button>
      <button class="period-btn" id="btn-custom" onclick="toggleDatePicker()">Custom ▾</button>
      <button class="period-btn" id="btn-compare" onclick="toggleCompare()" title="Compare to previous period" style="display:none">vs prev</button>
    </div>
  </div>

  <!-- DATE PICKER DROPDOWN -->
  <div id="compare-banner" style="display:none" class="compare-banner">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 6h10M6 1l5 5-5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span id="compare-banner-text"></span>
    <button onclick="setCompareMode(null)" style="margin-left:auto;background:none;border:none;color:var(--orange);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;opacity:0.7;">✕ Remove</button>
  </div>

  <!-- DATE PICKER DROPDOWN -->
  <div id="date-picker" style="display:none;position:fixed;top:56px;right:16px;z-index:500;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:16px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.5);">
    <div style="font-size:11px;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.6px;font-weight:500;">Custom date range</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
      <div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">From</div>
        <input type="date" id="date-from" style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 8px;outline:none;box-sizing:border-box;" />
      </div>
      <div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">To</div>
        <input type="date" id="date-to" style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 8px;outline:none;box-sizing:border-box;" />
      </div>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.6px;font-weight:500;">Quick select</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;" id="quick-btns"></div>
    <button onclick="applyCustomDates()" style="width:100%;background:var(--orange);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;">Apply dates</button>
    <div style="border-top:1px solid var(--border);margin-top:14px;padding-top:12px;">
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.6px;font-weight:500;">Compare to</div>
      <div style="display:flex;gap:6px;">
        <button onclick="setCompareMode('prev_period')" id="cmp-prev" style="flex:1;font-size:11px;padding:5px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;">Previous period</button>
        <button onclick="setCompareMode('prev_year')" id="cmp-year" style="flex:1;font-size:11px;padding:5px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;">Same period last year</button>

      TikTok
    </button>

      <svg class="ptab-icon" viewBox="0 0 16 16" fill="none"><rect width="16" height="16" rx="3" fill="#E60023"/><path d="M8 2C4.7 2 2 4.7 2 8c0 2.5 1.5 4.6 3.6 5.6-.05-.4-.1-1 0-1.4l.7-2.8s-.2-.4-.2-1c0-1 .6-1.7 1.3-1.7.6 0 .9.5.9 1 0 .6-.4 1.5-.6 2.3-.2.7.3 1.3 1 1.3 1.2 0 2-1.3 2-3 0-1.6-1.1-2.7-2.7-2.7-1.9 0-3 1.4-3 2.9 0 .6.2 1.2.5 1.5.05.07.06.13.04.2l-.2.8c-.03.1-.1.13-.2.1C4.3 10.3 3.7 9.2 3.7 8c0-2.3 1.7-4.4 4.9-4.4 2.6 0 4.6 1.8 4.6 4.2 0 2.5-1.6 4.6-3.8 4.6-.7 0-1.4-.4-1.6-.8l-.45 1.7c-.16.6-.6 1.4-.9 1.9.7.2 1.4.3 2.05.3 3.3 0 6-2.7 6-6s-2.7-6-6-6z" fill="white"/></svg>
      Pinterest
    </button>

  <div class="content" id="content">
    <div class="state-box">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><rect x="4" y="28" width="6" height="8" rx="1" fill="currentColor"/><rect x="13" y="20" width="6" height="16" rx="1" fill="currentColor"/><rect x="22" y="12" width="6" height="24" rx="1" fill="currentColor"/><rect x="31" y="4" width="6" height="32" rx="1" fill="currentColor"/></svg>
      <p>Select a client to load their dashboard</p>

</main>

<script>
// ─── CONFIG ────────────────────────────────────────────────
const WINDSOR_BASE = 'https://connectors.windsor.ai/';

// Lead gen clients — different metric set
const LEAD_GEN_CLIENTS = ['457775049411494'];

const CLIENTS = {
  facebook: [
    { id: '1142622296536709', name: 'Fragrance Samples UK' },
    { id: '1391771454464525', name: 'Bedrooms Plus Ltd' },
    { id: '1071305009552720', name: 'Country House Outdoor' },
    { id: '243539866329062',  name: 'Horns of Odin' },
    { id: '877017732651263',  name: 'CP Lighting & Interiors' },
    { id: '468452590544702',  name: 'Decorum Living' },
    { id: '1138713326327890', name: 'Neo Direct' },
    { id: '457775049411494',  name: 'Oven Support' },
    { id: '223014600213426',  name: 'Alchemy London' },
  ],
  pinterest: {
    '549770135568': '1142622296536709',
    '549762428303': '877017732651263',
    '549766701568': '468452590544702',
  },
  pinterest_organic: {
    'fragrancesamplesUK': '1142622296536709',
    'cplights': '877017732651263',
  }
};

// ─── STATE ─────────────────────────────────────────────────
let state = {
  apiKey: localStorage.getItem('windsor_api_key') || '',
  client: null,
  platform: 'facebook',
  period: 'last_7d',
  dateFrom: null,
  dateTo: null,
  compareMode: null, // 'prev_period' | 'prev_year' | null
  cache: {},
  charts: {}
};

if (state.apiKey) document.getElementById('api-key-input').value = state.apiKey;

// ─── INIT ──────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const main = document.querySelector('.main');
  const toggle = document.getElementById('sidebar-toggle');
  sidebar.classList.toggle('collapsed');
  main.classList.toggle('expanded');
  toggle.classList.toggle('collapsed');
}

function init() {
  const list = document.getElementById('client-list');
  list.innerHTML = CLIENTS.facebook.map(c => `
    <button class="client-btn" onclick="selectClient('${c.id}')" id="cb-${c.id}">
      <span class="client-dot"></span>
      <span class="client-name">${c.name}</span>
    </button>`).join('');
}

// ─── API KEY ───────────────────────────────────────────────
function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) return;
  state.apiKey = val;
  localStorage.setItem('windsor_api_key', val);
  if (state.client) loadData();
}

// ─── CLIENT SELECT ─────────────────────────────────────────
function selectClient(id) {
  state.client = id;
  state.cache = {};
  document.querySelectorAll('.client-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('cb-' + id);
  if (btn) btn.classList.add('active');
  const name = CLIENTS.facebook.find(c => c.id === id)?.name || id;
  document.getElementById('topbar-title').textContent = name;
  document.getElementById('live-badge').style.display = 'flex';
  document.getElementById('platform-tabs').style.display = 'flex';
  document.getElementById('btn-compare').style.display = '';

  // Show relevant platform tabs
  const hasPinterest = Object.values(CLIENTS.pinterest).includes(id);
  document.getElementById('tab-pinterest').style.display = hasPinterest ? '' : 'none';
  document.getElementById('tab-tiktok').style.display = 'none'; // show when TikTok connected

  if (!state.apiKey) {
    showError('Add your Windsor.ai API key in the sidebar to load data.');
    return;
  }
  loadData();
}

// ─── PERIOD / PLATFORM ────────────────────────────────────
function setPreset(period, btn) {
  state.period = period;
  state.dateFrom = null;
  state.dateTo = null;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('btn-compare').style.display = '';
  document.getElementById('date-picker').style.display = 'none';
  if (state.client) loadData();
}

// Keep old name as alias for compatibility
function setPeriod(period, btn) { setPreset(period, btn); }

function toggleDatePicker() {
  const dp = document.getElementById('date-picker');
  dp.style.display = dp.style.display === 'none' ? 'block' : 'none';
  if (dp.style.display === 'block') buildQuickBtns();
}

function buildQuickBtns() {
  const now = new Date();
  const yr = now.getFullYear();
  const presets = [
    [`Q1 ${yr-1}`, `${yr-1}-01-01`, `${yr-1}-03-31`],
    [`Q2 ${yr-1}`, `${yr-1}-04-01`, `${yr-1}-06-30`],
    [`Q3 ${yr-1}`, `${yr-1}-07-01`, `${yr-1}-09-30`],
    [`Q4 ${yr-1}`, `${yr-1}-10-01`, `${yr-1}-12-31`],
    [`Full ${yr-1}`, `${yr-1}-01-01`, `${yr-1}-12-31`],
    [`Q1 ${yr}`, `${yr}-01-01`, `${yr}-03-31`],
    [`Jan ${yr}`, `${yr}-01-01`, `${yr}-01-31`],
    [`Feb ${yr}`, `${yr}-02-01`, `${yr}-02-28`],
    [`Mar ${yr}`, `${yr}-03-01`, `${yr}-03-31`],
    [`Apr ${yr}`, `${yr}-04-01`, `${yr}-04-30`],
  ];
  document.getElementById('quick-btns').innerHTML = presets.map(([label,from,to]) =>
    `<button onclick="setCustomQuick('${from}','${to}')" style="font-size:11px;padding:3px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;">${label}</button>`
  ).join('');
}

function setCustomQuick(from, to) {
  document.getElementById('date-from').value = from;
  document.getElementById('date-to').value = to;
}

function applyCustomDates() {
  const from = document.getElementById('date-from').value;
  const to = document.getElementById('date-to').value;
  if (!from || !to) return;
  state.period = null;
  state.dateFrom = from;
  state.dateTo = to;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-custom').classList.add('active');
  document.getElementById('btn-custom').textContent = `${formatDateShort(from)} – ${formatDateShort(to)} ▾`;
  document.getElementById('btn-compare').style.display = '';
  document.getElementById('date-picker').style.display = 'none';
  if (state.client) loadData();
}

function toggleCompare() {
  const dp = document.getElementById('date-picker');
  dp.style.display = dp.style.display === 'none' ? 'block' : 'none';
  if (dp.style.display === 'block') buildQuickBtns();
}

function setCompareMode(mode) {
  state.compareMode = mode;
  state.cache = {};
  ['cmp-prev','cmp-year','cmp-none'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.background = 'var(--bg3)';
    el.style.borderColor = 'var(--border2)';
    el.style.color = 'var(--text2)';
  });
  const activeId = mode === 'prev_period' ? 'cmp-prev' : mode === 'prev_year' ? 'cmp-year' : 'cmp-none';
  const activeEl = document.getElementById(activeId);
  if (activeEl) {
    activeEl.style.background = 'var(--orange-dim)';
    activeEl.style.borderColor = 'var(--orange)';
    activeEl.style.color = 'var(--orange)';
  }
  const btn = document.getElementById('btn-compare');
  btn.style.background = mode ? 'var(--orange-dim)' : '';
  btn.style.borderColor = mode ? 'var(--orange)' : '';
  btn.style.color = mode ? 'var(--orange)' : '';

  // Update compare banner
  const banner = document.getElementById('compare-banner');
  const bannerText = document.getElementById('compare-banner-text');
  if (mode && banner) {
    const cd = getCompareDates();
    const label = mode === 'prev_year' ? 'Same period last year' : 'Previous period';
    bannerText.textContent = `Comparing to ${label}${cd ? ': '+formatDateShort(cd.from)+' – '+formatDateShort(cd.to) : ''}. Dashed lines on charts show comparison period.`;
    banner.style.display = 'flex';
  } else if (banner) {
    banner.style.display = 'none';
  }

  document.getElementById('date-picker').style.display = 'none';
  if (state.client) loadData();
}

function formatDateShort(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'2-digit'});
}

function getCompareDates() {
  if (!state.compareMode) return null;
  let from, to;
  if (state.dateFrom && state.dateTo) {
    from = new Date(state.dateFrom + 'T00:00:00');
    to = new Date(state.dateTo + 'T00:00:00');
  } else {
    const preset = state.period;
    const now = new Date();
    if (preset === 'last_7d') { to = new Date(now); to.setDate(to.getDate()-1); from = new Date(to); from.setDate(from.getDate()-6); }
    else if (preset === 'last_30d') { to = new Date(now); to.setDate(to.getDate()-1); from = new Date(to); from.setDate(from.getDate()-29); }
    else if (preset === 'this_month') { from = new Date(now.getFullYear(),now.getMonth(),1); to = new Date(now); }
    else if (preset === 'last_1m') { const lm = new Date(now.getFullYear(),now.getMonth()-1,1); from = lm; to = new Date(now.getFullYear(),now.getMonth(),0); }
    else if (preset === 'last_3m') { to = new Date(now); to.setDate(to.getDate()-1); from = new Date(to); from.setDate(from.getDate()-89); }
    else if (preset === 'last_year') { from = new Date(now.getFullYear()-1,now.getMonth(),now.getDate()); to = new Date(now); to.setDate(to.getDate()-1); }
    else return null;
  }
  const dayDiff = Math.round((to - from) / 86400000);
  let cFrom, cTo;
  if (state.compareMode === 'prev_period') {
    cTo = new Date(from); cTo.setDate(cTo.getDate()-1);
    cFrom = new Date(cTo); cFrom.setDate(cFrom.getDate()-dayDiff);
  } else {
    cFrom = new Date(from); cFrom.setFullYear(cFrom.getFullYear()-1);
    cTo = new Date(to); cTo.setFullYear(cTo.getFullYear()-1);
  }
  return {
    from: cFrom.toISOString().split('T')[0],
    to: cTo.toISOString().split('T')[0]
  };
}

// Close date picker when clicking outside
document.addEventListener('click', e => {
  const dp = document.getElementById('date-picker');
  if (dp && dp.style.display !== 'none') {
    if (!dp.contains(e.target) && !document.getElementById('btn-custom').contains(e.target) && !document.getElementById('btn-compare').contains(e.target)) {
      dp.style.display = 'none';
    }
  }
});

function setPlatform(platform, btn) {
  state.platform = platform;
  document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (state.client) loadData();
}

// ─── WINDSOR FETCH ─────────────────────────────────────────
async function fetchWindsor(connector, accountId, fields, datePreset, options = {}, dateFrom = null, dateTo = null) {
  const cacheKey = `${connector}_${accountId}_${fields.join(',')}_${datePreset}_${dateFrom}_${dateTo}_${JSON.stringify(options)}`;
  if (state.cache[cacheKey]) return state.cache[cacheKey];

  const res = await fetch('/.netlify/functions/windsor', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      api_key: state.apiKey,
      connector,
      date_preset: datePreset,
      date_from: dateFrom,
      date_to: dateTo,
      fields: fields.join(','),
      account_id: accountId,
      options,
    })
  });

  if (!res.ok) throw new Error(`Windsor API error: ${res.status}`);
  const json = await res.json();
  const data = json.data || json;
  state.cache[cacheKey] = data;
  return data;
}

// ─── LOAD DATA ─────────────────────────────────────────────
async function loadData() {
  destroyCharts();
  showLoading();

  try {
    const connector = state.platform;
    let accountId = state.client;
    let organicRows = [];

    if (connector === 'pinterest') {
      const pid = Object.entries(CLIENTS.pinterest).find(([k,v])=>v===state.client)?.[0];
      if (!pid) { showError('No Pinterest account linked for this client.'); return; }
      accountId = pid;

      // Fetch organic data in parallel if available
      const organicId = Object.entries(CLIENTS.pinterest_organic).find(([k,v])=>v===state.client)?.[0];
      const pinterestOptions = { attribution_window: '30/30/30', conversion_report_time: 'TIME_OF_CONVERSION' };

      const paidFields = ['date','spend','impressions','clicks','reach','frequency','cpm','total_checkout','total_checkout_value'];
      const campFields = ['campaign','spend','impressions','clicks','total_checkout','total_checkout_value'];

      const [rows, campRows, orgRows] = await Promise.all([
        fetchWindsor('pinterest', accountId, paidFields, state.period, pinterestOptions),
        fetchWindsor('pinterest', accountId, campFields, state.period, pinterestOptions),
        organicId ? fetchWindsor('pinterest_organic', organicId,
          ['date','pin_impression','pin_click','pin_outbound_click','pin_save'],
          state.period, { 'account__content_type': 'ORGANIC' }) : Promise.resolve([]),
      ]);

      organicRows = orgRows;
      renderDashboard(rows, campRows, [], connector, organicRows);
      return;
    }

    const isLeadGen = LEAD_GEN_CLIENTS.includes(accountId);

    const fields = isLeadGen
      ? ['date','account_id','spend','impressions','clicks','reach','actions_lead','actions_offsite_conversion_fb_pixel_lead','actions_purchase','cost_per_action_type_offsite_conversion_fb_pixel_lead','cost_per_action_type_offsite_conversion_fb_pixel_purchase','actions_landing_page_view']
      : ['date','account_id','spend','impressions','clicks','reach','actions_purchase','action_values_offsite_conversion_fb_pixel_purchase'];

    const campFields = isLeadGen
      ? ['campaign','account_id','spend','impressions','clicks','actions_lead','actions_offsite_conversion_fb_pixel_lead','actions_purchase','cost_per_action_type_offsite_conversion_fb_pixel_lead']
      : ['campaign','account_id','spend','impressions','clicks','actions_purchase','action_values_offsite_conversion_fb_pixel_purchase'];

    const creativeFields = isLeadGen
      ? ['ad_name','ad_id','account_id','spend','impressions','clicks','actions_offsite_conversion_fb_pixel_lead','actions_purchase','image_url','thumbnail_url']
      : ['ad_name','ad_id','account_id','spend','impressions','clicks','actions_purchase','action_values_offsite_conversion_fb_pixel_purchase','image_url','thumbnail_url'];

    const [rows, campRows, creativeRows] = await Promise.all([
      fetchWindsor(connector, accountId, fields, state.period, {}, state.dateFrom, state.dateTo),
      fetchWindsor(connector, accountId, campFields, state.period, {}, state.dateFrom, state.dateTo),
      fetchWindsor(connector, accountId, creativeFields, state.period, {}, state.dateFrom, state.dateTo),
    ]);

    // Fetch comparison period if enabled
    let compareRows = [];
    const compareDates = getCompareDates();
    if (compareDates) {
      compareRows = await fetchWindsor(connector, accountId, fields, null, {}, compareDates.from, compareDates.to);
    }

    renderDashboard(rows, campRows, creativeRows, connector, [], isLeadGen, compareRows, compareDates);
  } catch(e) {
    showError('Could not load data. Check your API key or try refreshing. ' + e.message);
  }
}

// ─── RENDER ────────────────────────────────────────────────
function renderDashboard(rows, campRows, creativeRows, connector, organicRows = [], isLeadGen = false, compareRows = [], compareDates = null) {
  const active = rows.filter(r => parseFloat(r.spend||0) > 0);
  if (!active.length) { showError('No data found for this period.'); return; }

  const totalSpend = sum(active, 'spend');
  const totalImpressions = sum(active, 'impressions');
  const totalClicks = sum(active, 'clicks');
  const totalReach = sum(active, 'reach');
  const ctr = totalImpressions > 0 ? (totalClicks / totalImpressions * 100) : 0;
  const avgCpm = totalImpressions > 0 ? (totalSpend / totalImpressions * 1000) : 0;
  const avgFreq = totalReach > 0 ? totalImpressions / totalReach : 0;

  // Lead gen metrics
  const totalLeads = isLeadGen ? sum(active, 'actions_offsite_conversion_fb_pixel_lead') : 0;
  const totalPurchases = isLeadGen ? sum(active, 'actions_purchase') : 0;
  const totalLPV = isLeadGen ? sum(active, 'actions_landing_page_view') : 0;
  const cpl = totalLeads > 0 ? totalSpend / totalLeads : 0;
  const cpp = totalPurchases > 0 ? totalSpend / totalPurchases : 0;
  const leadRate = totalLPV > 0 ? (totalLeads / totalLPV * 100) : 0;
  const clickToLead = totalClicks > 0 ? (totalLeads / totalClicks * 100) : 0;

  // Ecom metrics
  const totalRev = !isLeadGen ? (connector === 'facebook' ? sum(active, 'action_values_offsite_conversion_fb_pixel_purchase') : sum(active, 'total_checkout_value')) : 0;
  const totalOrders = !isLeadGen ? (connector === 'facebook' ? sum(active, 'actions_purchase') : sum(active, 'total_checkout')) : 0;
  const roas = !isLeadGen && totalSpend > 0 ? totalRev / totalSpend : 0;
  const cpa = !isLeadGen && totalOrders > 0 ? totalSpend / totalOrders : 0;
  const aov = !isLeadGen && totalOrders > 0 ? totalRev / totalOrders : 0;

  // Comparison period metrics
  const hasCompare = compareRows && compareRows.length > 0;
  const cmpActive = hasCompare ? compareRows.filter(r => parseFloat(r.spend||0) > 0) : [];
  const cmpSpend = hasCompare ? sum(cmpActive, 'spend') : 0;
  const cmpRev = hasCompare ? (!isLeadGen ? (connector==='facebook' ? sum(cmpActive,'action_values_offsite_conversion_fb_pixel_purchase') : sum(cmpActive,'total_checkout_value')) : 0) : 0;
  const cmpOrders = hasCompare ? (!isLeadGen ? (connector==='facebook' ? sum(cmpActive,'actions_purchase') : sum(cmpActive,'total_checkout')) : 0) : 0;
  const cmpLeads = hasCompare && isLeadGen ? sum(cmpActive,'actions_offsite_conversion_fb_pixel_lead') : 0;
  const cmpRoas = cmpSpend > 0 && cmpRev > 0 ? cmpRev/cmpSpend : 0;
  const cmpCpl = cmpSpend > 0 && cmpLeads > 0 ? cmpSpend/cmpLeads : 0;
  const cmpImpr = hasCompare ? sum(cmpActive,'impressions') : 0;
  const cmpClicks = hasCompare ? sum(cmpActive,'clicks') : 0;
  const cmpCtr = cmpImpr > 0 ? (cmpClicks/cmpImpr*100) : 0;
  const cmpCpm = cmpImpr > 0 ? (cmpSpend/cmpImpr*1000) : 0;

  function delta(current, previous, invert = false) {
    if (!hasCompare || !previous) return '';
    const pct = ((current - previous) / previous * 100);
    const up = pct >= 0;
    const good = invert ? !up : up;
    const color = good ? 'var(--green)' : 'var(--red)';
    const arrow = up ? '▲' : '▼';
    return `<div style="font-size:10px;color:${color};margin-top:2px;">${arrow} ${Math.abs(pct).toFixed(1)}% vs ${compareDates ? formatDateShort(compareDates.from)+'–'+formatDateShort(compareDates.to) : 'prev'}</div>`;
  }
  const byDate = {};
  active.forEach(r => {
    const d = r.date;
    if (!byDate[d]) byDate[d] = { date:d, spend:0, impressions:0, clicks:0, reach:0,
      action_values_offsite_conversion_fb_pixel_purchase:0, actions_purchase:0,
      total_checkout_value:0, total_checkout:0,
      actions_offsite_conversion_fb_pixel_lead:0, actions_landing_page_view:0 };
    byDate[d].spend += parseFloat(r.spend||0);
    byDate[d].impressions += parseFloat(r.impressions||0);
    byDate[d].clicks += parseFloat(r.clicks||0);
    byDate[d].reach += parseFloat(r.reach||0);
    byDate[d].action_values_offsite_conversion_fb_pixel_purchase += parseFloat(r.action_values_offsite_conversion_fb_pixel_purchase||0);
    byDate[d].actions_purchase += parseFloat(r.actions_purchase||0);
    byDate[d].total_checkout_value += parseFloat(r.total_checkout_value||0);

// ─── HELPERS ───────────────────────────────────────────────
function sum(arr, key) { return arr.reduce((a,r)=>a+parseFloat(r[key]||0),0); }

function fmt(n) {
  if (isNaN(n)||n===null) return '-';
  return '£' + (n>=10000?(n/1000).toFixed(1)+'k':n>=1000?n.toLocaleString('en-GB',{maximumFractionDigits:0}):n.toFixed(2));
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

function truncate(s, n) { return s && s.length > n ? s.slice(0,n)+'…' : s; }

function metricCard(label, val, sub, color, deltaHTML = '') {
  return `<div class="metric-card">
    <div class="metric-label">${label}</div>
    <div class="metric-val"${color?` style="color:${color}"`:''}>${val}</div>
    <div class="metric-delta delta-neutral">${sub}</div>
    ${deltaHTML}
  </div>`;
}

function aggregateCampaigns(rows, connector, isLeadGen = false) {
  const map = {};
  rows.forEach(r => {
    const name = r.campaign || 'Unknown';
    if (!map[name]) map[name] = { name, spend:0, rev:0, orders:0, leads:0, impressions:0, clicks:0 };
    map[name].spend += parseFloat(r.spend||0);
    map[name].impressions += parseFloat(r.impressions||0);
    map[name].clicks += parseFloat(r.clicks||0);
    if (isLeadGen) {
      map[name].leads += parseFloat(r.actions_offsite_conversion_fb_pixel_lead||0);
      map[name].orders += parseFloat(r.actions_purchase||0);
    } else {
      map[name].rev += parseFloat((connector==='facebook'?r.action_values_offsite_conversion_fb_pixel_purchase:r.total_checkout_value)||0);
      map[name].orders += parseFloat((connector==='facebook'?r.actions_purchase:r.total_checkout)||0);
    }
  });
  return Object.values(map).filter(c=>c.spend>0).sort((a,b)=>b.spend-a.spend);
}

function imgProxy(url) {
  if (!url) return null;
  return `/.netlify/functions/imgproxy?url=${encodeURIComponent(url)}`;
}

function aggregateCreatives(rows, isLeadGen = false) {
  if (!rows || !rows.length) return [];
  const map = {};
  rows.forEach(r => {
    const id = r.ad_id || r.ad_name || 'unknown';
    if (!map[id]) map[id] = {
      id, name: r.ad_name || 'Unknown',
      spend:0, rev:0, orders:0, leads:0, impressions:0, clicks:0,
      image_url: null, thumbnail_url: null
    };
    map[id].spend += parseFloat(r.spend||0);
    map[id].impressions += parseFloat(r.impressions||0);
    map[id].clicks += parseFloat(r.clicks||0);
    if (isLeadGen) {
      map[id].leads += parseFloat(r.actions_offsite_conversion_fb_pixel_lead||0);
      map[id].orders += parseFloat(r.actions_purchase||0);
    } else {
      map[id].rev += parseFloat(r.action_values_offsite_conversion_fb_pixel_purchase||0);
      map[id].orders += parseFloat(r.actions_purchase||0);
    }
    if (!map[id].image_url && r.image_url) map[id].image_url = r.image_url;
    if (!map[id].thumbnail_url && r.thumbnail_url) map[id].thumbnail_url = r.thumbnail_url;
  });
  return Object.values(map).filter(c=>c.spend>0).sort((a,b)=>b.spend-a.spend);
}

function buildLeadGenInsights(spend, leads, purchases, cpl, cpp, leadRate, clickToLead, sorted, cplData) {
  const insights = [];
  const validCPL = cplData.filter(v => v !== null && v > 0);

  if (leads === 0) {
    insights.push({type:'bad', text:'No leads recorded this period — check pixel is firing correctly on the thank you / confirmation page', tag:'Pixel check'});
  } else {
    insights.push({type:'ok', text:`${leads} leads generated at ${fmt(cpl)} CPL — ${purchases} purchases/bookings also tracked alongside lead volume`, tag:'Lead volume'});
  }

  if (leadRate > 0) {
    if (leadRate >= 10) insights.push({type:'ok', text:`Landing page converting at ${leadRate.toFixed(1)}% — strong lead rate from paid traffic landing page views`, tag:'Strong CVR'});
    else if (leadRate >= 5) insights.push({type:'warn', text:`Landing page converting at ${leadRate.toFixed(1)}% — room to improve. Review page copy, form friction and load speed`, tag:'CVR opportunity'});
    else insights.push({type:'bad', text:`Landing page converting at only ${leadRate.toFixed(1)}% — significant drop-off between landing page view and lead. Prioritise CRO`, tag:'Low CVR'});
  }

  if (validCPL.length > 3) {
    const recent = validCPL.slice(-3).reduce((a,b)=>a+b,0)/3;
    const early = validCPL.slice(0,3).reduce((a,b)=>a+b,0)/3;
    if (recent < early * 0.9) insights.push({type:'ok', text:`CPL improving — recent 3-day average (${fmt(recent)}) is lower than the opening period (${fmt(early)})`, tag:'CPL improving'});
    else if (recent > early * 1.1) insights.push({type:'warn', text:`CPL rising — recent 3-day average (${fmt(recent)}) is higher than the opening period (${fmt(early)}). Review creative fatigue`, tag:'CPL rising'});
  }

  if (clickToLead > 0 && clickToLead < 3) insights.push({type:'warn', text:`Only ${clickToLead.toFixed(2)}% of clicks convert to a lead — consider whether landing page messaging matches ad creative`, tag:'Ad-page match'});
  if (purchases > 0 && leads > 0) {
    const leadToPurchase = (purchases / leads * 100);
    insights.push({type: leadToPurchase > 20 ? 'ok' : 'warn', text:`${leadToPurchase.toFixed(0)}% of leads converting to purchases/bookings — ${leadToPurchase > 20 ? 'strong lead quality' : 'review lead quality and follow-up process'}`, tag:'Lead quality'});
  }

  return insights;
}

function buildInsights(roas, cpa, aov, ctr, freq, sorted, roasData, totalSpend, totalOrders) {
  const insights = [];
  const validROAS = roasData.filter(r => r !== null);

  // ROAS trend
  if (validROAS.length > 3) {
    const recent = validROAS.slice(-3).reduce((a,b)=>a+b,0)/3;
    const early = validROAS.slice(0,3).reduce((a,b)=>a+b,0)/3;
    if (recent > early * 1.1) insights.push({type:'ok', text:`ROAS trending upward — recent 3-day average (${recent.toFixed(2)}x) is stronger than the opening period (${early.toFixed(2)}x)`, tag:'Improving'});
    else if (recent < early * 0.9) insights.push({type:'warn', text:`ROAS trending downward — recent 3-day average (${recent.toFixed(2)}x) is weaker than the opening period (${early.toFixed(2)}x). Review for creative fatigue`, tag:'Declining'});
  }

  // Frequency warning
  if (freq > 3.5) insights.push({type:'warn', text:`Frequency at ${freq.toFixed(2)} — audiences are seeing ads more than 3.5 times on average. Consider refreshing creatives or expanding audiences`, tag:'Ad fatigue'});
  else if (freq > 2.5) insights.push({type:'warn', text:`Frequency at ${freq.toFixed(2)} — worth monitoring for signs of creative fatigue over the coming days`, tag:'Monitor freq.'});

  // CTR signal
  if (ctr < 1.0) insights.push({type:'warn', text:`CTR of ${ctr.toFixed(2)}% is below 1% — creatives may not be resonating or audiences may need refreshing`, tag:'Low CTR'});
  else if (ctr > 2.5) insights.push({type:'ok', text:`CTR of ${ctr.toFixed(2)}% is strong — creatives are generating good engagement relative to impressions`, tag:'Strong CTR'});

  // ROAS variance — flag volatile days
  if (validROAS.length > 3) {
    const max = Math.max(...validROAS);
    const min = Math.min(...validROAS);
    if (max > min * 2.5) insights.push({type:'warn', text:`ROAS swings significantly day-to-day (low: ${min.toFixed(2)}x, high: ${max.toFixed(2)}x) — worth reviewing what drove the best days`, tag:'High variance'});
  }

  // CPA vs AOV
  if (aov > 0 && cpa > aov * 0.5) insights.push({type:'warn', text:`CPA (${fmt(cpa)}) is more than 50% of AOV (${fmt(aov)}) — customer acquisition cost is high relative to order value`, tag:'CPA watch'});

  // Best performing day
  const bestIdx = roasData.reduce((bi, v, i) => (v !== null && (bi === -1 || v > roasData[bi])) ? i : bi, -1);
  if (bestIdx >= 0) insights.push({type:'ok', text:`Best ROAS day was ${sorted[bestIdx]?.date ? formatDate(sorted[bestIdx].date) : 'this period'} at ${roasData[bestIdx].toFixed(2)}x — review what was running that day for scaling signals`, tag:'Best day'});

  return insights;
}
